<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — Yingyingying Amulet</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Georgia',serif;
      background:linear-gradient(135deg,#1a1410,#2d1e06);
      color:#e8c96a;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:20px;text-align:center;
    }
    h1{font-size:80px;margin-bottom:10px;color:#c9a84c}
    h2{font-size:24px;margin-bottom:30px;font-weight:normal;opacity:0.85}
    a{
      display:inline-block;
      padding:14px 32px;
      background:linear-gradient(135deg,#c9a84c,#e8c96a);
      color:#12100a;
      text-decoration:none;
      border-radius:30px;
      font-weight:700;
      letter-spacing:1px;
      transition:transform 0.2s;
    }
    a:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
