<script>
(function(){
  // ──────────────────────────────────────────────────────────────────────
  //  Phra Somdej 3D — three rendering modes:
  //    1. GLB upload  → loads a real 3D model via GLTFLoader (best quality)
  //    2. Front+Back  → renders a flat tablet with textures on each face
  //    3. Neither     → hero-3d is hidden, hero goes single-column
  //
  //  applySettings() in the main script sets window.PHRA_GLB,
  //  window.PHRA_FRONT_IMG, and window.PHRA_BACK_IMG before calling
  //  window.initPhra3D() — we pick the mode from those values here.
  // ──────────────────────────────────────────────────────────────────────

  let initialised = false;
  let currentMode = '';                          // 'glb' | 'tablet' | ''
  let scene, camera, renderer, phraGroup, halo, clock, canvas;
  let frontTex = null, backTex = null;
  let loadedGlbUrl = '';                         // remember what we loaded so we can detect changes

  // Public: refresh textures or model when settings change.
  // The main applySettings() function calls initPhra3D() which handles both
  // cold-start and refresh, so this is mostly a thin shim.
  window.refreshPhra3DTextures = function(){
    if(!initialised) return;
    window.initPhra3D();   // will detect mode change and rebuild scene
  };

  // Public entry point. Idempotent — safe to call on every settings change.
  window.initPhra3D = function(){
    canvas = canvas || document.getElementById('phra3d');
    if(!canvas || !window.THREE) return;

    const wantGlb    = !!window.PHRA_GLB;
    const wantTablet = !wantGlb && !!(window.PHRA_FRONT_IMG && window.PHRA_BACK_IMG);
    const newMode    = wantGlb ? 'glb' : (wantTablet ? 'tablet' : '');
    if(!newMode){ return; }   // nothing to render — applySettings hid the block

    // If the mode changed, or the glb URL changed, tear down the existing scene.
    const glbChanged = wantGlb && loadedGlbUrl !== window.PHRA_GLB;
    if(initialised && (currentMode !== newMode || glbChanged)){
      disposeScene();
      initialised = false;
    }

    if(!initialised){
      buildScene();
      initialised = true;
      currentMode = newMode;
    }

    // For tablet mode, refresh the textures from current globals.
    if(newMode === 'tablet'){
      loadTabletTextures();
    } else if(newMode === 'glb'){
      loadGlbModel(window.PHRA_GLB);
      loadedGlbUrl = window.PHRA_GLB;
    }
  };

  // ──────────────────────────────────────────────────────────────────────
  //  Scene building — common parts (camera, lights, renderer, halo)
  // ──────────────────────────────────────────────────────────────────────
  function buildScene(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
    camera.position.set(0, 0, 7);

    renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
    // ─── Cap pixel ratio for performance ───
    // Full retina (DPR 3) on a phone means 9x the pixels to render every
    // frame. That's heavy on a WebGL scene with envMaps. Cap at 2 on
    // desktop and 1.5 on touch devices — the model is small enough that
    // the visual difference is minimal.
    const isMobileForPx = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const dprCap = isMobileForPx ? 1.5 : 2;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, dprCap));
    renderer.setClearColor(0x000000, 0);
    // Studio-quality colour & exposure for metallic models (gold/brass).
    // outputColorSpace = sRGB ensures colours render as the artist intended
    // (without this, dark areas crush to near-black).
    // ACESFilmic toneMapping gives a soft "studio photo" exposure curve.
    // Exposure 1.6 lifts the overall brightness without blowing highlights.
    if(THREE.SRGBColorSpace !== undefined){
      renderer.outputColorSpace = THREE.SRGBColorSpace;
    } else if(THREE.sRGBEncoding !== undefined){
      // Older three.js fallback
      renderer.outputEncoding = THREE.sRGBEncoding;
    }
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.75;

    function resize(){
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      if(canvas.width !== w * window.devicePixelRatio || canvas.height !== h * window.devicePixelRatio){
        renderer.setSize(w, h, false);
        camera.aspect = w/h;
        camera.updateProjectionMatrix();
      }
    }
    resize();
    window.addEventListener('resize', resize);

    phraGroup = new THREE.Group();
    scene.add(phraGroup);

    // Halo placeholder — kept in the scene graph so later code that references
    // `halo` doesn't crash, but invisible. Setting opacity to 0 (rather than
    // omitting the mesh) preserves the rest of the scene-management logic.
    const haloGeom = new THREE.PlaneGeometry(3.5, 4.6);
    const haloMat  = new THREE.MeshBasicMaterial({
      color: 0xc9a84c, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
      visible: false,
    });
    halo = new THREE.Mesh(haloGeom, haloMat);
    halo.position.z = -0.6;
    scene.add(halo);

    // ─── DIRECT LIGHTS — supplementary only ───
    // The envMap handles most of the lighting for shiny gold. These
    // direct lights add a touch of definition to shape and form, but
    // they are intentionally LOW intensity so they don't overwhelm the
    // gold reflections (which is what makes gold actually look like gold).
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
    keyLight.position.set(3, 5, 5);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xfff4d6, 0.3);
    rimLight.position.set(-3, 4, -4);
    scene.add(rimLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.2);
    fillLight.position.set(-4, 1, 3);
    scene.add(fillLight);

    // Minimal ambient — the envMap provides general illumination.
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));

    // Very subtle hemisphere — tints shadows slightly.
    const hemi = new THREE.HemisphereLight(0xfff4d6, 0x1a1a1a, 0.15);
    scene.add(hemi);

    // ─── HDR-STYLE STUDIO ENVIRONMENT — designed for shiny gold ───
    // Polished gold is a perfect mirror — its appearance comes ENTIRELY
    // from what it reflects. We bake a procedural studio into an envMap.
    //
    // Performance note: PMREMGenerator can be expensive. We use a small
    // env scene and the lowest acceptable roughness on PMREM (0.04)
    // to keep memory/GPU cost down on mobile.
    try {
      const pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();

      const envScene = new THREE.Scene();
      envScene.background = new THREE.Color(0x0a0a0a);

      // 4 bright sources at studio angles (down from 6 — lighter on mobile)
      const lights = [
        [ 6,  5,  6,  4.0, 0xffffff, 8.0],   // main softbox
        [-5,  4,  5,  3.0, 0xfff4e0, 5.0],   // secondary key
        [ 0,  8,  2,  3.5, 0xfffaf0, 5.0],   // top fill
        [ 0, -3,  6,  2.0, 0xffe8c0, 2.5],   // bottom bounce
      ];
      lights.forEach(([x, y, z, size, color, intensity]) => {
        const m = new THREE.Mesh(
          new THREE.SphereGeometry(size, 12, 12),  // 12-segment is plenty for env
          new THREE.MeshBasicMaterial({
            color: new THREE.Color(color).multiplyScalar(intensity),
            toneMapped: false,
          })
        );
        m.position.set(x, y, z);
        envScene.add(m);
      });

      const envTexture = pmrem.fromScene(envScene, 0.04).texture;
      scene.environment = envTexture;
      pmrem.dispose();
    } catch(e){
      console.warn('[phra3d] PMREM env map failed (ok, will use lights only):', e);
    }

    setupInteractionAndAnimation();
  }

  function disposeScene(){
    if(renderer) renderer.dispose();
    if(scene){
      scene.traverse(obj => {
        if(obj.geometry) obj.geometry.dispose();
        if(obj.material){
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(m => {
            if(m.map) m.map.dispose();
            m.dispose();
          });
        }
      });
    }
    scene = camera = renderer = phraGroup = halo = clock = null;
    frontTex = backTex = null;
    loadedGlbUrl = '';
  }

  // ──────────────────────────────────────────────────────────────────────
  //  Mode 1 — GLB model loading
  // ──────────────────────────────────────────────────────────────────────
  function loadGlbModel(url){
    if(!url || !window.THREE || !window.THREE.GLTFLoader){
      console.warn('[phra3d] GLTFLoader not available');
      return;
    }
    console.log('[phra3d] loading glb:', url.slice(0, 80) + (url.length > 80 ? '...' : ''));
    const loader = new THREE.GLTFLoader();

    // Helper: take a parsed glTF and add it to the scene with auto-fit + recentre.
    const onParsed = (gltf) => {
      // Remove previous model children (keep halo etc. which are on scene, not group)
      while(phraGroup.children.length) phraGroup.remove(phraGroup.children[0]);

      const model = gltf.scene || gltf.scenes[0];

      // Auto-fit: compute bounding box, scale to fit ~3 units tall, recentre
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3(); box.getSize(size);
      const center = new THREE.Vector3(); box.getCenter(center);
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const targetSize = 3.5;
      const scale = targetSize / maxDim;
      model.scale.setScalar(scale);
      model.position.x = -center.x * scale;
      model.position.y = -center.y * scale;
      model.position.z = -center.z * scale;

      // ─── Tune materials for a metallic gold look — but PRESERVE textures ───
      // Trellis exports come with baked baseColor textures that include all
      // the model's surface detail (red cushion, fabric folds, etc.). We
      // must KEEP these textures, otherwise the model becomes a single
      // colour and loses all detail.
      //
      // What we tune:
      //   • mat.color → warm gold tint (1.0, 0.78, 0.42) — acts as a
      //     MULTIPLIER on the texture. White texture pixels become gold;
      //     red cushion pixels become a warmer red-gold (still distinct).
      //   • metalness → 1.0  (full metal — reflects light, doesn't absorb)
      //   • roughness → 0.32 (polished, not mirror — soft highlights)
      //   • envMapIntensity → 1.0 (strong environment reflections)
      //
      // What we leave alone:
      //   • mat.map (baseColor texture — has the actual surface detail!)
      //   • All other maps (normal, AO, emissive, etc.)
      model.traverse(obj => {
        if(obj.isMesh && obj.material){
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(mat => {
            if(mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial){
              // Studio environment so metal reflects something
              if(scene.environment) mat.envMap = scene.environment;
              mat.envMapIntensity = 1.8;  // strong reflections = gold shine
              // Warm gold tint — deeper amber gold for that "burnished
              // leaf" look. Texture × this multiplier = rich gold.
              mat.color.setRGB(0.95, 0.62, 0.20);
              // Force polished-metal physical properties.
              mat.metalness = 1.0;
              mat.roughness = 0.25;
              mat.needsUpdate = true;
            }
          });
        }
      });

      phraGroup.add(model);
      // ─── Force re-renders once textures + env are fully decoded ───
      // The model can render before its textures finish decoding, which
      // briefly shows it as dark/black. We schedule additional renders
      // over the next ~600ms to make sure the first paint is correct.
      [50, 150, 350, 600].forEach(delay => {
        setTimeout(() => {
          if(renderer && scene && camera) renderer.render(scene, camera);
        }, delay);
      });
      console.log('[phra3d] glb loaded. dims (pre-scale):',
                  size.x.toFixed(2), size.y.toFixed(2), size.z.toFixed(2),
                  '→ scale:', scale.toFixed(3));
    };

    const onLoadError = (err) => {
      console.error('[phra3d] glb load failed:', err);
      // Fallback: try to render images instead, if available
      if(window.PHRA_FRONT_IMG && window.PHRA_BACK_IMG){
        console.log('[phra3d] falling back to tablet textures');
        currentMode = 'tablet';
        buildTabletGeometry();
        loadTabletTextures();
      }
    };

    // Workaround for Firebase Storage CORS issue with GLTFLoader's XHR.
    // We fetch the file as a Blob first (fetch() handles CORS differently
    // and Firebase Storage's signed URLs are accessible to fetch), then
    // hand the ArrayBuffer directly to GLTFLoader.parse().
    if(/^https?:\/\//i.test(url)){
      fetch(url)
        .then(r => {
          if(!r.ok) throw new Error('HTTP ' + r.status);
          return r.arrayBuffer();
        })
        .then(buf => {
          // parse(data, path, onLoad, onError)
          loader.parse(buf, '', onParsed, onLoadError);
        })
        .catch(onLoadError);
    } else {
      // data: URL or local path — use the loader's built-in load
      loader.load(url, onParsed, undefined, onLoadError);
    }
  }

  // ──────────────────────────────────────────────────────────────────────
  //  Mode 2 — Flat tablet with front/back textures
  // ──────────────────────────────────────────────────────────────────────
  function buildTabletGeometry(){
    // Clear any old children
    while(phraGroup.children.length) phraGroup.remove(phraGroup.children[0]);

    const W = 1.5, H = 2.21, D = 0.18;

    function makeRoundedRectShape(w, h, r){
      const shape = new THREE.Shape();
      shape.moveTo(-w + r, -h);
      shape.lineTo(w - r, -h);
      shape.quadraticCurveTo(w, -h, w, -h + r);
      shape.lineTo(w, h - r);
      shape.quadraticCurveTo(w, h, w - r, h);
      shape.lineTo(-w + r, h);
      shape.quadraticCurveTo(-w, h, -w, h - r);
      shape.lineTo(-w, -h + r);
      shape.quadraticCurveTo(-w, -h, -w + r, -h);
      return shape;
    }

    const shape = makeRoundedRectShape(W, H, 0.04);
    let tabletGeom = new THREE.ExtrudeGeometry(shape, {
      depth: D, bevelEnabled: true, bevelThickness: 0.025,
      bevelSize: 0.025, bevelSegments: 4, curveSegments: 12
    });
    tabletGeom.translate(0, 0, -D/2 - 0.025);
    tabletGeom = tabletGeom.toNonIndexed();
    tabletGeom.computeVertexNormals();

    const posAttr = tabletGeom.attributes.position;
    const normAttr = tabletGeom.attributes.normal;
    const triCount = posAttr.count / 3;
    const fronts = [], backs = [], sides = [];
    for(let t = 0; t < triCount; t++){
      const i0 = t*3, i1 = t*3+1, i2 = t*3+2;
      const nz = (normAttr.getZ(i0) + normAttr.getZ(i1) + normAttr.getZ(i2)) / 3;
      const tri = [i0, i1, i2];
      if(nz > 0.7) fronts.push(tri);
      else if(nz < -0.7) backs.push(tri);
      else sides.push(tri);
    }

    const ordered = fronts.concat(backs).concat(sides);
    const newPos = new Float32Array(triCount * 9);
    const newNorm = new Float32Array(triCount * 9);
    const newUV = new Float32Array(triCount * 6);
    for(let t = 0; t < ordered.length; t++){
      const [a, b, c] = ordered[t];
      const dst = t * 9, dstUv = t * 6;
      [a, b, c].forEach((src, k) => {
        newPos[dst + k*3]   = posAttr.getX(src);
        newPos[dst + k*3+1] = posAttr.getY(src);
        newPos[dst + k*3+2] = posAttr.getZ(src);
        newNorm[dst + k*3]   = normAttr.getX(src);
        newNorm[dst + k*3+1] = normAttr.getY(src);
        newNorm[dst + k*3+2] = normAttr.getZ(src);
        const x = posAttr.getX(src), y = posAttr.getY(src);
        const isBack = t >= fronts.length && t < fronts.length + backs.length;
        newUV[dstUv + k*2]   = isBack ? 1 - (x + W) / (2*W) : (x + W) / (2*W);
        newUV[dstUv + k*2+1] = (y + H) / (2*H);
      });
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(newPos, 3));
    geom.setAttribute('normal',   new THREE.BufferAttribute(newNorm, 3));
    geom.setAttribute('uv',       new THREE.BufferAttribute(newUV, 2));
    geom.addGroup(0,                                  fronts.length * 3, 0);
    geom.addGroup(fronts.length * 3,                  backs.length * 3,  1);
    geom.addGroup((fronts.length + backs.length) * 3, sides.length * 3,  2);

    const frontMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.65, metalness: 0.05});
    const backMat  = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.65, metalness: 0.05});
    const sideMat  = new THREE.MeshStandardMaterial({color: 0xc8b88a, roughness: 0.85, metalness: 0.05});
    const tablet = new THREE.Mesh(geom, [frontMat, backMat, sideMat]);
    phraGroup.add(tablet);
  }

  function loadTabletTextures(){
    // Make sure tablet geometry exists (cold start in tablet mode)
    if(!phraGroup.children.length) buildTabletGeometry();
    const tablet = phraGroup.children[0];
    if(!tablet || !Array.isArray(tablet.material)) return;

    function loadTex(url, slot){
      const tex = new THREE.Texture();
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = false;
      const img = new Image();
      img.onload = () => {
        const cvs = document.createElement('canvas');
        cvs.width = img.naturalWidth;
        cvs.height = img.naturalHeight;
        cvs.getContext('2d').drawImage(img, 0, 0);
        tex.image = cvs;
        tex.needsUpdate = true;
        tablet.material[slot].map = tex;
        tablet.material[slot].needsUpdate = true;
      };
      if(/^https?:/i.test(url)) img.crossOrigin = 'anonymous';
      img.src = url;
      return tex;
    }

    if(frontTex) frontTex.dispose();
    if(backTex)  backTex.dispose();
    frontTex = loadTex(window.PHRA_FRONT_IMG, 0);
    backTex  = loadTex(window.PHRA_BACK_IMG,  1);
  }

  // ──────────────────────────────────────────────────────────────────────
  //  Interaction + animation loop (mode-independent)
  // ──────────────────────────────────────────────────────────────────────
  function setupInteractionAndAnimation(){
    let mouseX = 0, mouseY = 0, targetRotX = 0, targetRotY = 0, scrollOffset = 0;
    window.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      if(rect.width === 0) return;
      mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouseY = ((e.clientY - rect.top) / rect.height) * 2 - 1;
      targetRotY = mouseX * 0.5;
      targetRotX = -mouseY * 0.25;
    });

    // ─── TOUCH ROTATION — only when actively dragging the canvas ───
    // Previously we listened to touchmove on `window`, which meant that
    // scrolling the page (which is a touchmove) was being interpreted as
    // a drag-to-rotate. The model would tilt based on where the user's
    // finger happened to be on the screen during scroll — leading to the
    // model appearing upside-down/flipped after scrolling.
    //
    // Now we ONLY listen to touchmove that starts inside the canvas, and
    // we reset the target rotation when the user lifts their finger so
    // the model springs back to its resting position.
    let isDraggingCanvas = false;
    canvas.addEventListener('touchstart', (e) => {
      isDraggingCanvas = true;
    }, {passive: true});
    canvas.addEventListener('touchmove', (e) => {
      if(!isDraggingCanvas || !e.touches[0]) return;
      const rect = canvas.getBoundingClientRect();
      if(rect.width === 0) return;
      mouseX = ((e.touches[0].clientX - rect.left) / rect.width) * 2 - 1;
      mouseY = ((e.touches[0].clientY - rect.top) / rect.height) * 2 - 1;
      targetRotY = mouseX * 0.5;
      targetRotX = -mouseY * 0.25;
    }, {passive: true});
    const onTouchEnd = () => {
      isDraggingCanvas = false;
      // Spring back to resting position so the model returns upright
      // instead of staying wherever the user dragged it to.
      targetRotY = 0;
      targetRotX = 0;
    };
    canvas.addEventListener('touchend', onTouchEnd, {passive: true});
    canvas.addEventListener('touchcancel', onTouchEnd, {passive: true});

    // tap-to-flip removed — the model just responds to drag/orbit now.
    let flipped = 0;
    // Scroll-linked rotation feels nice on desktop but on mobile it
    // leaves the model tilted/upside-down when scrolled back to top.
    // We detect mobile via the same media query the rest of the CSS
    // uses — touch detection is unreliable on hybrid devices (iPad with
    // pencil, etc).
    const enableScrollRot =
      typeof window.matchMedia === 'function'
        ? !window.matchMedia('(max-width: 900px)').matches &&
          !window.matchMedia('(hover: none)').matches
        : true;
    console.log('[phra3d] scroll rotation enabled:', enableScrollRot,
                'viewport:', window.innerWidth, 'x', window.innerHeight);
    window.addEventListener('scroll', () => {
      // Only update if scroll rotation is enabled — saves a tiny bit on mobile
      if(enableScrollRot) scrollOffset = window.scrollY;
    }, {passive: true});

    // ─── GYROSCOPE TILT — mobile only ───
    // Listens for device orientation events and tilts the 3D model.
    // iOS 13+ requires permission, which MUST be requested from a direct
    // user gesture. We listen for the first touch anywhere on the page
    // and request permission then — same effect as a button, but no UI.
    let gyroX = 0, gyroY = 0;
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    const onDeviceOrientation = (e) => {
      const beta  = (e.beta  || 0);
      const gamma = (e.gamma || 0);
      gyroY = Math.max(-0.4, Math.min(0.4, gamma * 0.012));
      gyroX = Math.max(-0.25, Math.min(0.25, (beta - 45) * 0.008));
    };

    if(isTouch){
      const iosNeedsPermission =
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function';

      if(iosNeedsPermission){
        // iOS — request permission on first user interaction anywhere.
        // This produces the same iOS permission popup, just triggered
        // automatically when the user first touches the page (which is
        // how they're already interacting anyway).
        const requestGyroNow = () => {
          DeviceOrientationEvent.requestPermission()
            .then(state => {
              if(state === 'granted'){
                window.addEventListener('deviceorientation', onDeviceOrientation, {passive: true});
                console.log('[phra3d] gyro permission granted');
              } else {
                console.log('[phra3d] gyro permission denied:', state);
              }
            })
            .catch(err => console.warn('[phra3d] gyro permission request failed:', err));
          // Remove all listeners — request only once
          document.removeEventListener('touchend', requestGyroNow);
          document.removeEventListener('click', requestGyroNow);
        };
        // First touch on ANY element triggers the request.
        document.addEventListener('touchend', requestGyroNow, {once: true, passive: true});
        document.addEventListener('click', requestGyroNow, {once: true});
      } else {
        // Android / non-iOS-13+ — listen directly, no permission needed
        window.addEventListener('deviceorientation', onDeviceOrientation, {passive: true});
      }
    }

    // ─── VISIBILITY-AWARE RENDERING (performance) ───
    // Pause the animation when the canvas scrolls off-screen, when the
    // tab is hidden, or when the user is on a low-power device. This is
    // critical on mobile — a continuously running WebGL loop drains
    // battery and makes the rest of the page laggy.
    let canvasVisible = true;
    if('IntersectionObserver' in window){
      new IntersectionObserver((entries) => {
        canvasVisible = entries[0].isIntersecting;
      }, {threshold: 0.05}).observe(canvas);
    }
    document.addEventListener('visibilitychange', () => {
      canvasVisible = !document.hidden && canvasVisible;
    });

    clock = new THREE.Clock();
    let curRotY = 0, curRotX = 0, curFlip = 0;
    function animate(){
      if(!renderer) return;     // disposed
      requestAnimationFrame(animate);
      // Skip rendering when hidden — huge battery & CPU saver on mobile.
      if(!canvasVisible || document.hidden) return;
      const t = clock.getElapsedTime();
      curRotY += (targetRotY - curRotY) * 0.05;
      curRotX += (targetRotX - curRotX) * 0.05;
      curFlip += (flipped - curFlip) * 0.06;
      const idleY = Math.sin(t * 0.35) * 0.06;
      const idleX = Math.cos(t * 0.45) * 0.03;
      const scrollRot = enableScrollRot ? (scrollOffset * 0.0015) : 0;
      if(phraGroup){
        phraGroup.rotation.y = curRotY + idleY + scrollRot + curFlip + gyroY;
        phraGroup.rotation.x = curRotX + idleX + gyroX;
        phraGroup.position.y = Math.sin(t * 1.1) * 0.1;
      }
      renderer.render(scene, camera);
    }
    animate();
  }

  // Try to init immediately in case applySettings already ran before
  // this script executed (script order varies depending on caching).
  if(window.PHRA_GLB || (window.PHRA_FRONT_IMG && window.PHRA_BACK_IMG)){
    window.initPhra3D();
  }
})();
</script>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  console.log('[LE-iframe] live edit script running. URL:', location.href, 'has liveedit:', params.has('liveedit'));
  if(!params.has('liveedit')) return;
  console.log('[LE-iframe] LIVE EDIT MODE active');

  // Inject CSS for hover outlines
  const style = document.createElement('style');
  style.textContent = `
    [data-le-hoverable]{outline:2px dashed transparent;outline-offset:3px;cursor:pointer !important;transition:outline-color .15s, background-color .15s;position:relative}
    [data-le-hoverable]:hover{outline-color:#c9a84c;background-color:rgba(201,168,76,0.06)}
    [data-le-hoverable]:hover::before{
      content:attr(data-le-label);
      position:absolute;top:-26px;left:0;background:#c9a84c;color:#12100a;
      font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;
      white-space:nowrap;z-index:99999;pointer-events:none;
      font-family:'Inter',sans-serif;letter-spacing:.5px;
      box-shadow:0 4px 12px rgba(0,0,0,.4);
    }
    body.le-mode { padding-top: 30px !important; }
    .le-banner{
      position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#c9a84c,#e8c96a);
      color:#12100a;text-align:center;font-size:12px;font-weight:700;
      padding:6px;z-index:99998;font-family:'Inter',sans-serif;letter-spacing:1px;
      box-shadow:0 2px 10px rgba(0,0,0,.3);
    }
  `;
  document.head.appendChild(style);
  document.body.classList.add('le-mode');

  // Visible banner
  const banner = document.createElement('div');
  banner.className = 'le-banner';
  banner.textContent = '✨ LIVE EDIT MODE — Click any highlighted element to edit it';
  document.body.appendChild(banner);

  // Elements to make clickable — keyed by ANY selector that exists in index.html.
  // Each target = [selector_string, label]. We add data-le-hoverable to the first
  // element that matches.
  const targets = [
    // Top bar / branding
    ['.topbar',       'Top Bar'],
    ['.logo',         'Logo'],
    ['.logo-icon',    'Logo Icon'],
    ['.logo-text',    'Shop Name'],
    ['.logo-sub',     'Shop Tagline'],
    // Navigation
    ['nav',           'Navigation'],
    ['.nav-links',    'Nav Links'],
    // Hero
    ['#heroEyebrow',  'Eyebrow'],
    ['#heroTitle',    'Hero Title'],
    ['#heroSub',      'Subtitle'],
    ['#heroDesc',     'Description'],
    ['#heroBtns',     'Hero Buttons'],
    ['#heroStats',    'Hero Stats'],
    ['#heroBg',       'Background Image'],
    ['.hero-3d',      '3D Phra Somdej'],
    // Homepage sections
    ['.featured-section', 'Featured Items'],
    ['#featuredGrid', 'Featured Items'],
    ['.home-reviews-section', 'Reviews Preview'],
    ['#homeReviewsSection', 'Reviews Preview'],
    ['#homeRevTitle', 'Reviews Title'],
    ['#homeRevSub', 'Reviews Subtitle'],
    ['#homeRevGrid', 'Reviews Preview'],
    ['.home-services-section', 'Service Cards'],
    ['#homeServicesSection', 'Service Cards'],
    ['.trust-grid',   'Trust Badges'],
    ['#trustGrid',    'Trust Badges'],
    // Section headers (each page)
    ['#amuletsTitle', 'Amulets Title'],
    ['#amuletsDesc',  'Amulets Description'],
    ['#accTitle',     'Accessories Title'],
    ['#accDesc',      'Accessories Description'],
    ['#casingTitle',  'Casing Title'],
    ['#casingDesc',   'Casing Description'],
    ['#projTitle',    'Projects Title'],
    ['#projDesc',     'Projects Description'],
    ['#revTitle',     'Reviews Title'],
    ['#revSub',       'Reviews Description'],
    ['#payTitle',     'Payment Title'],
    ['#paySub',       'Payment Description'],
    // Grids
    ['#aGrid',        'Amulets Grid'],
    ['#acGrid',       'Accessories Grid'],
    ['#cTypeGrid',    'Casing Types Grid'],
    // Contact section
    ['.contact-group','Contact Section'],
  ];

  // Walks up the DOM from `el` and collects every selector we know about
  // (so the admin gets a list of candidates to match against).
  function getEditableSelectors(el){
    const out = [];
    let cur = el;
    while(cur && cur !== document.body){
      const ds = cur.getAttribute && cur.getAttribute('data-le-selector');
      if(ds && out.indexOf(ds) === -1) out.push(ds);
      cur = cur.parentElement;
    }
    return out;
  }

  function attach(){
    let count = 0;
    targets.forEach(([sel, label]) => {
      const el = document.querySelector(sel);
      if(!el) return;
      // Skip if already tagged with another selector — keep the most specific
      // tag (the first one we add) so labels don't flicker on re-attach.
      if(el.getAttribute('data-le-hoverable') && el.getAttribute('data-le-selector') !== sel){
        // Already labelled with something else, keep it
        return;
      }
      el.setAttribute('data-le-hoverable', '1');
      el.setAttribute('data-le-label', label);
      el.setAttribute('data-le-selector', sel);
      count++;
    });
    console.log('[LE-iframe] attached to', count, 'elements');

    // Nav links → individual hover labels ("Manage X →")
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(a => {
      const linkId = (a.id || '').replace(/^nav-/, '');
      const txt = (a.textContent || '').trim();
      a.setAttribute('data-le-hoverable', '1');
      a.setAttribute('data-le-label', '✏️ Manage "' + txt + '"');
      a.setAttribute('data-le-selector', 'nav-link:' + linkId);
    });
    if(navLinks.length) console.log('[LE-iframe] attached to', navLinks.length, 'nav links');

    // Product / list cards
    const page = detectCurrentPage();
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
      if(card.closest('.featured-grid')){
        card.setAttribute('data-le-product-page', 'featured');
      } else {
        card.setAttribute('data-le-product-page', page || 'amulets');
      }
      card.setAttribute('data-le-hoverable', '1');
      card.setAttribute('data-le-label', '✏️ Edit item');
      card.setAttribute('data-le-selector', '.card');
    });
    if(cards.length) console.log('[LE-iframe] attached to', cards.length, 'product cards on page', page);
  }

  function detectCurrentPage(){
    // page-{name} sections — find the one without display:none
    const pages = document.querySelectorAll('[id^="page-"]');
    for(const p of pages){
      if(p.offsetParent !== null && getComputedStyle(p).display !== 'none'){
        return p.id.replace('page-', '');
      }
    }
    return null;
  }

  // Intercept clicks
  document.addEventListener('click', function(e){
    // Special: clicks on a nav link → manage that page directly
    // (matches anchor inside .nav-links, whose id is "nav-{pageId}")
    const navLink = e.target.closest('.nav-links a, .nav-links li a');
    if(navLink){
      e.preventDefault();
      e.stopPropagation();
      const linkId = navLink.id || '';            // "nav-amulets"
      const pageId = linkId.replace(/^nav-/, ''); // "amulets"
      const label  = (navLink.textContent || '').trim();
      const data = {
        type: 'le-click',
        selectors: ['nav-link:' + pageId],  // synthetic selector
        selector:  'nav-link:' + pageId,
        label:     'Manage "' + label + '" page',
        page:      pageId
      };
      console.log('[LE-iframe] nav link click → page:', pageId);
      try { window.parent.postMessage(data, '*'); } catch(err) {}
      return;
    }

    const target = e.target.closest('[data-le-hoverable]');
    if(!target) return;
    e.preventDefault();
    e.stopPropagation();
    // Collect this element's selector + all hoverable ancestors' selectors
    // so the admin can match the most specific one available.
    const selectors = getEditableSelectors(target);
    const ownSel = target.getAttribute('data-le-selector') || '';
    if(ownSel && selectors.indexOf(ownSel) === -1) selectors.unshift(ownSel);
    const data = {
      type: 'le-click',
      selectors: selectors,
      selector: ownSel,                    // legacy single-selector field
      label: target.getAttribute('data-le-label') || '',
      page: target.getAttribute('data-le-product-page') || null
    };
    console.log('[LE-iframe] click on:', data);
    try { window.parent.postMessage(data, '*'); console.log('[LE-iframe] message posted to parent'); } catch(err) { console.error('[LE-iframe] postMessage failed:', err); }
  }, true);

  // Re-attach when DOM changes (for dynamically rendered content)
  const obs = new MutationObserver(() => {
    clearTimeout(window._leAttachT);
    window._leAttachT = setTimeout(attach, 150);
  });
  obs.observe(document.body, {childList:true, subtree:true});

  // Listen for commands from the parent (admin)
  window.addEventListener('message', function(e){
    if(!e.data || typeof e.data !== 'object') return;
    if(e.data.type === 'le-goto' && e.data.page){
      console.log('[LE-iframe] received goto:', e.data.page);
      if(typeof goPage === 'function'){
        goPage(e.data.page);
        // Scroll to top of preview so the relevant section is visible
        window.scrollTo({top: 0, behavior: 'smooth'});
      } else {
        console.warn('[LE-iframe] goPage() not available');
      }
    }
  });

  // Initial attach + signal ready to parent
  function ready(){
    attach();
    try { window.parent.postMessage({type:'le-ready'}, '*'); console.log('[LE-iframe] ready message sent'); } catch(err) { console.error('[LE-iframe] cannot send ready:', err); }
  }
  if(document.readyState === 'complete' || document.readyState === 'interactive'){
    setTimeout(ready, 100);
  } else {
    window.addEventListener('load', ready);
  }
})();
</script>

</body>
</html>
