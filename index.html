<script>
// ───── DIAGNOSTIC: trace what causes "Unsafe attempt to load URL" errors ─────
// This patches Image.src and CSS backgroundImage so we can see who's loading
// the page URL itself (which is what triggers the file:// CORS error).
(function diagnose(){
  if(location.protocol !== 'file:') return; // only run when debugging file://
  const pageURL = location.href;

  // Patch Image.src
  const desc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  if(desc && desc.set){
    Object.defineProperty(HTMLImageElement.prototype, 'src', {
      configurable: true,
      enumerable: true,
      get: desc.get,
      set: function(v){
        if(v === '' || v == null || v === pageURL){
          console.warn('[DIAG] Image.src set to suspicious value:', JSON.stringify(v));
          console.trace('[DIAG] stack trace:');
        } else if(typeof v === 'string' && v.length < 200){
          console.log('[DIAG] Image.src ←', v.slice(0,100));
        } else {
          console.log('[DIAG] Image.src ← (long URL,', typeof v === 'string' ? v.length : '?', 'chars)');
        }
        return desc.set.call(this, v);
      }
    });
  }
})();
</script>
<style>
  :root{
    --gold:#c9a84c;--gold-light:#e8c96a;--gold-dark:#8b6914;
    --cream:#fdf6e3;--deep:#12100a;--accent:#8b0000;
    --text:#2c1a06;--text-muted:#7a6040;--surface:#fff9ee;
    --border:rgba(201,168,76,0.28);
    --font-display:var(--font-display);

    /* ─── LIQUID GLASS DESIGN TOKENS ───
       Centralised so we can swap the whole "glass" look in one place. */
    --glass-bg:rgba(255,251,235,0.55);
    --glass-bg-strong:rgba(255,251,235,0.72);
    --glass-bg-dark:rgba(20,16,8,0.45);
    --glass-border:rgba(201,168,76,0.32);
    --glass-border-strong:rgba(201,168,76,0.55);
    --glass-shadow:0 10px 40px rgba(139,105,20,0.13), 0 2px 6px rgba(201,168,76,0.08);
    --glass-shadow-hover:0 18px 60px rgba(139,105,20,0.22), 0 4px 12px rgba(201,168,76,0.15);
    --glass-shadow-inner:inset 0 1px 0 rgba(255,255,255,0.5);
    --glass-blur:18px;
    --glass-blur-strong:32px;
  }
  *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}

  /* ─── Body background with ambient glow orbs ───
     The orbs sit behind everything via a fixed pseudo-element, giving the
     frosted glass elements something colourful to blur against. */
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(at 20% 80%, rgba(232,201,106,.22) 0%, transparent 55%),
      radial-gradient(at 80% 20%, rgba(201,168,76,.18) 0%, transparent 50%),
      radial-gradient(at 40% 40%, rgba(139,0,0,.06) 0%, transparent 60%),
      var(--cream);
    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
    background-attachment:fixed;
    position:relative;
  }
  /* Drifting glow orbs — pure CSS, no JS. Adds subtle motion that makes the
     glass blur effect look "alive". */
  body::before, body::after{
    content:'';
    position:fixed;
    width:480px;height:480px;
    border-radius:50%;
    filter:blur(80px);
    pointer-events:none;
    z-index:0;
    opacity:.55;
    will-change:transform;
  }
  body::before{
    top:-100px;left:-100px;
    background:radial-gradient(circle, rgba(232,201,106,.45) 0%, transparent 70%);
    animation:floatOrb1 22s ease-in-out infinite;
  }
  body::after{
    bottom:-150px;right:-100px;
    background:radial-gradient(circle, rgba(201,168,76,.35) 0%, transparent 70%);
    animation:floatOrb2 28s ease-in-out infinite;
  }
  @keyframes floatOrb1{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(80px,40px) scale(1.1)}
    66%{transform:translate(-40px,80px) scale(.95)}
  }
  @keyframes floatOrb2{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(-60px,-40px) scale(1.05)}
    66%{transform:translate(40px,-80px) scale(.9)}
  }
  /* Reduce orbs on mobile for performance */
  @media(max-width:780px){
    body::before, body::after{width:280px;height:280px;filter:blur(60px)}
  }
  /* Respect prefers-reduced-motion */
  @media(prefers-reduced-motion:reduce){
    body::before, body::after{animation:none}
  }
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold-light),var(--gold));border-radius:3px}

  /* All content sits above the floating orbs */
  nav, .page, .topbar, .fb-splash, footer{position:relative;z-index:1}

  /* ─── GLASS UTILITY CLASSES ───
     Apply .glass to any element to get the frosted-glass treatment.
     .glass-dark for cards over dark backgrounds (like hero). */
  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow),var(--glass-shadow-inner);
    transition:background .25s, border-color .25s, transform .25s, box-shadow .25s;
  }
  .glass:hover{
    background:var(--glass-bg-strong);
    border-color:var(--glass-border-strong);
    box-shadow:var(--glass-shadow-hover),var(--glass-shadow-inner);
  }
  .glass-dark{
    background:var(--glass-bg-dark);
    backdrop-filter:blur(var(--glass-blur-strong)) saturate(160%);
    -webkit-backdrop-filter:blur(var(--glass-blur-strong)) saturate(160%);
    border:1px solid rgba(201,168,76,0.25);
  }

  .topbar{background:var(--deep);color:var(--gold-light);text-align:center;padding:8px 16px;font-size:13px;letter-spacing:1px}

  nav{
    position:sticky;top:0;z-index:100;
    background:rgba(18,16,10,0.92);
    backdrop-filter:blur(16px) saturate(160%);
    -webkit-backdrop-filter:blur(16px) saturate(160%);
    border-bottom:1px solid rgba(201,168,76,0.28);
    box-shadow:0 4px 24px rgba(0,0,0,.25);
  }
  .nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:66px;gap:12px}
  .logo{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px rgba(201,168,76,0.35);overflow:hidden;flex-shrink:0}
  .logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
  .logo-icon.has-image{background:transparent;box-shadow:0 0 16px rgba(201,168,76,0.35)}
  .logo-text{color:var(--gold-light);font-size:16px;font-weight:700;line-height:1.15;font-family:var(--font-display)}
  .logo-sub{color:#9e8a60;font-size:10px;letter-spacing:2px}
  .nav-links{display:flex;gap:2px;list-style:none;flex-wrap:wrap}
  .nav-links a{color:#c8b888;text-decoration:none;padding:8px 13px;border-radius:7px;font-size:14px;font-weight:500;transition:all .2s;cursor:pointer;white-space:nowrap}
  .nav-links a:hover,.nav-links a.active{color:var(--gold-light);background:rgba(201,168,76,0.13)}

  .page{display:none;animation:fadeUp .4s ease}
  .page.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ───── INITIAL LOAD SPLASH ─────
     Cover the screen with the brand colour until Firebase data arrives,
     so users don't see seed/default values flash in for a beat.
     The splash is removed once <html class="fb-ready"> is set. */
  .fb-splash{
    position:fixed;inset:0;z-index:99999;
    background:#0a0805;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .35s ease-out;
    pointer-events:auto;
  }
  .fb-splash-inner{
    display:flex;flex-direction:column;align-items:center;gap:16px;
    opacity:.85;
  }
  .fb-splash-logo{
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold-light,#e8c96a),var(--gold-dark,#8b6914));
    box-shadow:0 0 30px rgba(201,168,76,.35);
    display:flex;align-items:center;justify-content:center;
  }
  .fb-splash-logo img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .fb-splash-dots{display:flex;gap:6px}
  .fb-splash-dot{
    width:6px;height:6px;border-radius:50%;background:#c9a84c;
    animation:fbDot 1.2s ease-in-out infinite both;
  }
  .fb-splash-dot:nth-child(2){animation-delay:.15s}
  .fb-splash-dot:nth-child(3){animation-delay:.3s}
  @keyframes fbDot{
    0%,80%,100%{opacity:.3;transform:scale(.85)}
    40%{opacity:1;transform:scale(1)}
  }
  html.fb-ready .fb-splash{opacity:0;pointer-events:none}

  /* While Firebase isn't ready yet, hide content that would otherwise
     flash with seed data. We show them once <html class="fb-ready"> set. */
  html:not(.fb-ready) .nav-links,
  html:not(.fb-ready) .topbar,
  html:not(.fb-ready) .home-section{
    visibility:hidden;
  }
  /* Outer wrapper: full-bleed dark gradient. Inner .hero is constrained. */
  .hero-wrap{
    background:
      radial-gradient(ellipse at 20% 70%,rgba(201,168,76,.08) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 30%,rgba(139,0,0,.05) 0%,transparent 45%),
      linear-gradient(165deg,#0a0805 0%,#1a1208 30%,#231700 60%,#0d0a06 100%);
    position:relative;
    overflow:hidden;
  }
  .hero{
    min-height:100vh;
    display:grid;grid-template-columns:1.05fr 1fr;
    align-items:center;
    gap:40px;
    padding:0 60px;position:relative;
    /* Constrain content on large/ultrawide screens */
    max-width:1400px;
    margin:0 auto;
  }
  /* When no 3D model is uploaded, hero is single-column full width */
  .hero.no-3d{grid-template-columns:1fr;padding:0 80px;max-width:1200px}
  .hero.no-3d .hero-inner{max-width:900px;margin:0 auto;text-align:center;padding:80px 0}
  .hero.no-3d .hero-title{text-align:center}
  .hero.no-3d .hero-sub{text-align:center}
  .hero.no-3d .hero-desc{text-align:center;max-width:680px;margin-left:auto;margin-right:auto}
  .hero.no-3d .hero-btns{justify-content:center}
  .hero.no-3d .hero-stats{justify-content:center;max-width:none;margin-left:auto;margin-right:auto;width:fit-content}
  .hero.no-3d .stat{text-align:center;padding-left:0}
  .hero.no-3d .stat::before{display:none}
  @media(max-width:780px){
    /* ─── Mobile Hero — redesigned for breathing room ─── */
    .hero{
      grid-template-columns:1fr;
      gap:24px;
      padding:0 22px;
      min-height:auto;
    }
    .hero-inner{
      padding:36px 0 32px;
      max-width:100%;
      text-align:center;
    }
    .eyebrow{
      font-size:9.5px;letter-spacing:2.2px;
      padding:6px 12px;margin-bottom:22px;
      max-width:fit-content;margin-left:auto;margin-right:auto;
    }
    .eyebrow::before,.eyebrow::after{width:10px}
    .hero-title{
      font-size:38px;letter-spacing:-.5px;line-height:1.1;
      margin-bottom:14px;text-align:center;
    }
    .hero-title .ying{padding-right:.25em;margin-right:-.1em}
    .hero-sub{
      font-size:14.5px;line-height:1.5;margin-bottom:18px;
      text-align:center;letter-spacing:.2px;padding:0 6px;
    }
    .hero-desc{
      font-size:14px;line-height:1.7;margin-bottom:26px;
      max-width:100%;text-align:center;padding:0 6px;
    }
    .hero-btns{
      justify-content:center;gap:10px;margin-bottom:30px;
    }
    .hero-btns .btn,.hero-btns .btn-ol{
      flex:1 1 auto;max-width:300px;justify-content:center;
      padding:13px 22px;font-size:12.5px;letter-spacing:1.2px;
    }
    .hero-stats{
      display:grid;grid-template-columns:1fr 1fr;
      gap:14px 18px;margin-top:24px;padding-top:24px;
      max-width:100%;width:100%;
      justify-content:stretch;
    }
    .stat{padding-left:14px}
    .stat::before{display:block}
    .stat-num{font-size:28px;line-height:1}
    .stat-label{font-size:10px;letter-spacing:1.5px;margin-top:4px}

    /* When hero has no 3D / image visual — keep mobile centered too */
    .hero.no-3d{padding:0 22px;max-width:100%}
    .hero.no-3d .hero-inner{padding:36px 0 32px;text-align:center}
    .hero.no-3d .hero-title{text-align:center}
    .hero.no-3d .hero-sub{text-align:center}
    .hero.no-3d .hero-desc{text-align:center;margin:0 auto 26px}
    .hero.no-3d .hero-btns{justify-content:center}
    .hero.no-3d .hero-stats{justify-content:stretch;width:100%}
    .hero.no-3d .stat{text-align:left;padding-left:14px}

    /* Mobile 3D/image height — shorter so text + visual both visible */
    .hero-3d{height:55vh;max-height:420px;order:2}
    .hero-still-img{max-width:80%}
  }
  @media(max-width:380px){
    .hero-title{font-size:32px}
    .hero-stats{grid-template-columns:1fr 1fr;gap:12px 14px}
    .stat-num{font-size:24px}
    .eyebrow{font-size:8.5px;letter-spacing:1.8px;padding:5px 10px}
  }
  /* Old no-3d mobile rules — now superseded by the unified block above */
  /* Thai pattern overlay - subtle, gives non-AI feel — extended to full
     viewport width so it matches the hero background image. */
  .hero::before{
    content:'';position:absolute;
    top:0;bottom:0;
    left:calc(50% - 50vw);
    right:calc(50% - 50vw);
    width:100vw;
    background-image:
      radial-gradient(circle at 0 0,rgba(201,168,76,.04) 1px,transparent 1px),
      radial-gradient(circle at 30px 30px,rgba(201,168,76,.03) 1px,transparent 1px);
    background-size:60px 60px,60px 60px;
    background-position:0 0,30px 30px;
    pointer-events:none;z-index:1;
  }
  .hero::after{
    content:'';position:absolute;
    bottom:0;
    left:calc(50% - 50vw);
    right:calc(50% - 50vw);
    width:100vw;height:80px;
    background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.15) 100%);
    pointer-events:none;z-index:1;
  }
  .hero-bg{
    position:absolute;
    /* Extend beyond the constrained .hero box so the background image
       fills the entire .hero-wrap viewport width, even on huge monitors
       where .hero is capped at 1400px. */
    top:0;bottom:0;
    left:calc(50% - 50vw);
    right:calc(50% - 50vw);
    width:100vw;
    background-size:cover;background-position:center;
    opacity:0;transition:opacity .6s;
    z-index:0;
  }
  .hero-bg.show{opacity:.35}
  .hero-bg-overlay{
    position:absolute;
    top:0;bottom:0;
    left:calc(50% - 50vw);
    right:calc(50% - 50vw);
    width:100vw;
    /* Vignette-style overlay: dark at the edges (so text is readable) and
       transparent in the middle (so the hero image and any centerpiece
       isn't dimmed). Falls back to a top-bottom gradient on mobile via
       blend with rgba layers. */
    background:
      radial-gradient(ellipse 80% 90% at 50% 50%,
        transparent 0%,
        transparent 30%,
        rgba(18,16,10,.35) 75%,
        rgba(18,16,10,.6) 100%),
      linear-gradient(180deg,
        rgba(18,16,10,.2) 0%,
        rgba(18,16,10,.05) 30%,
        rgba(18,16,10,.05) 70%,
        rgba(18,16,10,.4) 100%);
    z-index:1;
    pointer-events:none;
  }

  /* 3D canvas container — z-index:10 to definitively sit above ALL hero
     overlays. isolation:isolate creates a stacking context so nothing
     from .hero (background, overlays) can blend onto the image inside. */
  .hero-3d{
    position:relative;
    width:100%;height:80vh;max-height:680px;
    z-index:10;
    isolation:isolate;
    display:flex;align-items:center;justify-content:center;
  }
  #phra3d{width:100%;height:100%;cursor:grab}
  #phra3d:active{cursor:grabbing}
  /* ─── HERO STILL IMAGE — absolute pass-through, zero interference ───
     Show the uploaded image EXACTLY. No filter, no shadow underneath
     that might overlap, no glow behind that might darken edges. */
  .hero-still-img{
    max-width:100%;max-height:100%;
    width:auto;height:auto;
    object-fit:contain;
    position:relative;
    z-index:10;
    opacity:1 !important;
  }

  /* ─── HAS-HERO-IMAGE MODE ───
     When admin uploads a still photo as hero, we kill ALL overlays and
     gradient layers that would tint or darken the centerpiece, and give
     the image a clean studio-style backdrop (deep neutral grey, just like
     a product-photo lightroom). This isolates the photo entirely from
     the rest of the site's gold/cream theme so its colours come through
     exactly as uploaded. */
  .hero.has-hero-image::before,
  .hero.has-hero-image::after{display:none !important}
  .hero.has-hero-image .hero-bg-overlay{display:none !important}
  .hero.has-hero-image .hero-bg{
    /* Replace the bg image (if any) with a clean studio gradient */
    background-image:radial-gradient(ellipse at center,
      #3a3a42 0%,
      #25252a 45%,
      #15151a 100%) !important;
    opacity:1 !important;
  }
  /* 3D mode: keep transparent — let the hero background show through.
     The 3D model gets its shine from the environment map (set in JS),
     which is invisible — only reflects onto the polished gold surface. */
  .phra-hint{position:absolute;bottom:-10px;left:0;right:0;text-align:center;color:rgba(201,168,76,.6);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;z-index:5;font-weight:500;pointer-events:none;padding:0 10px;line-height:1.4}
  /* glow halo — ONLY for 3D mode (not hero still image). Adding the
     .has-3d class to .hero-3d when a GLB/canvas is rendering keeps the
     glow from showing behind a still image (which already has its own
     shadow/colour built in). */
  .hero-3d.has-3d::before{
    content:'';position:absolute;width:60%;height:60%;
    top:50%;left:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(201,168,76,.25) 0%,rgba(139,0,0,.08) 35%,transparent 70%);
    filter:blur(40px);z-index:0;animation:glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
  /* sacred ring */
  .sacred-ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1}
  .sacred-ring.r1{width:340px;height:340px;border:1px solid rgba(201,168,76,.18);animation:rotR 60s linear infinite}
  .sacred-ring.r2{width:480px;height:480px;border:1px dashed rgba(201,168,76,.1);animation:rotR 90s linear infinite reverse}
  @keyframes rotR{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

  .ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.07);top:50%;left:50%;transform:translate(-50%,-50%);animation:rp 5s ease-in-out infinite;z-index:1}
  @keyframes rp{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.1;transform:translate(-50%,-50%) scale(1.025)}}
  .hero-inner{position:relative;z-index:3;max-width:560px;text-align:left;padding:80px 0}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.35);color:var(--gold-light);font-size:11px;letter-spacing:3.5px;padding:7px 18px;border-radius:0;margin-bottom:30px;font-weight:600;backdrop-filter:blur(4px);position:relative}
  .eyebrow::before,.eyebrow::after{content:'';width:18px;height:1px;background:var(--gold);opacity:.6}
  .hero-title{font-family:var(--font-display);font-size:clamp(42px,5.5vw,72px);font-weight:700;color:#fff;line-height:1.05;margin-bottom:16px;text-shadow:0 2px 24px rgba(0,0,0,.4);letter-spacing:-1px}

  /* ───── IMAGE LAZY LOAD + BLUR PROGRESSIVE ─────
     Approach:
     1. While loading: show animated shimmer placeholder
     2. As a backdrop, set a CSS background to a tiny blurred preview
        (the same image, requested via ImageKit at w-20,blur-10) — only
        ~1KB, loads almost instantly. Blurred up via CSS to fill the
        container.
     3. Once full-size image decoded: fade in over 350ms; the blur preview
        is hidden by the now-opaque foreground image.
     This eliminates the "blank box" feeling on cold cache misses — users
     see the SHAPE of the image immediately, then the sharp version. */
  img.is-loading{
    opacity:0;
    background:
      linear-gradient(90deg,
        rgba(201,168,76,.04) 0%,
        rgba(232,201,106,.10) 50%,
        rgba(201,168,76,.04) 100%),
      linear-gradient(135deg, #2d1e06 0%, #1a1408 100%);
    background-size:200% 100%, 100% 100%;
    background-blend-mode:overlay, normal;
    animation:imgShimmer 1.6s ease-in-out infinite;
    min-height:60px;
  }
  /* When a blur preview is set, use it as the background instead of shimmer */
  img.is-loading.has-blur{
    background-image:var(--blur-preview, none);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    animation:none;
    filter:blur(0); /* the bitmap is already blurred */
  }
  img.is-loaded{
    opacity:1;
    transition:opacity .35s ease-out;
    background:none;
    animation:none;
  }
  @keyframes imgShimmer{
    0%{background-position:200% 0, 0 0}
    100%{background-position:-200% 0, 0 0}
  }

  .casing-detail-desc li{margin-bottom:.35em;line-height:1.75}
  .casing-detail-desc a{
    color:var(--gold-dark);text-decoration:underline;
    text-decoration-color:rgba(201,168,76,.45);
    text-underline-offset:3px;transition:color .2s,text-decoration-color .2s;
  }
  .casing-detail-desc a:hover{color:var(--gold);text-decoration-color:var(--gold)}
  /* Alignment classes — execCommand produces inline style="text-align:..."
     and may also use these tags. Make sure both work. */
  .casing-detail-desc [style*="text-align:center"],
  .casing-detail-desc [align="center"]{text-align:center}
  .casing-detail-desc [style*="text-align:right"],
  .casing-detail-desc [align="right"]{text-align:right}
  .casing-detail-desc [style*="text-align:left"],
  .casing-detail-desc [align="left"]{text-align:left}

  /* Side info card — price */
  .casing-detail-side{display:flex;flex-direction:column;gap:14px}
  .cd-side-card{
    background:linear-gradient(135deg,var(--deep) 0%,#1f1608 100%);
    border:1px solid var(--gold);
    border-radius:12px;
    padding:22px 24px;
    text-align:center;
    box-shadow:0 6px 18px rgba(201,168,76,.12);
  }
  .cd-side-label{
    color:var(--gold);font-size:11px;letter-spacing:2.5px;
    font-weight:600;text-transform:uppercase;
    margin-bottom:8px;
  }
  .cd-side-value{
    font-family:var(--font-display);font-size:28px;
    color:var(--gold-light);font-weight:700;letter-spacing:.5px;
  }

  /* Available styles section header */
  .var-grid-head{
    display:flex;align-items:center;gap:18px;
    margin:18px 0 22px;
  }
  .var-grid-title{
    font-family:var(--font-display);font-size:20px;
    color:var(--text);font-weight:700;margin:0;
    white-space:nowrap;
  }
  .var-grid-line{
    flex:1;height:1px;
    background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);
  }

  @media(max-width:780px){
    .casing-detail-head{margin-bottom:24px}
    .casing-detail-title{font-size:24px}
    .casing-detail-price-badge{padding:5px 12px}
    .cd-price-chip-value{font-size:15px}
    .cd-price-chip-label{font-size:9.5px;letter-spacing:1px}
    .casing-detail-desc{font-size:14px;padding:16px 18px}
    .cd-side-card{padding:16px 20px}
    .cd-side-value{font-size:24px}
    .var-grid-title{font-size:17px}
  }
  .var-card{
    background:var(--glass-bg);
    backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:14px;overflow:hidden;cursor:pointer;
    transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease, background .3s ease;
    box-shadow:var(--glass-shadow),var(--glass-shadow-inner);
  }
  .var-card:hover{
    transform:translateY(-3px);
    background:var(--glass-bg-strong);
    border-color:var(--glass-border-strong);
    box-shadow:var(--glass-shadow-hover),var(--glass-shadow-inner);
  }
  .var-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(201,168,76,.15);border-color:var(--gold)}
  .var-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#2d1e06,#12100a);display:flex;align-items:center;justify-content:center;font-size:50px;position:relative;overflow:hidden}
  .var-img img{width:100%;height:100%;object-fit:cover}
  .var-img-count{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:white;font-size:11px;font-weight:600;padding:3px 9px;border-radius:25px;backdrop-filter:blur(6px)}
  .var-price-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--deep);font-family:var(--font-display);font-size:14px;font-weight:700;padding:5px 11px;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,.25);letter-spacing:.3px}
  .var-body{padding:14px 18px;text-align:center}
  .var-name{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px}
  .var-hint{font-size:11.5px;color:var(--gold-dark);font-weight:600;opacity:.85;transition:opacity .2s}
  .var-card:hover .var-hint{opacity:1}

  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
  .proj-card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(180%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);border:1px solid var(--glass-border);border-radius:16px;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease,background .3s ease;cursor:pointer;box-shadow:var(--glass-shadow),var(--glass-shadow-inner)}
  .proj-card:hover{border-color:var(--gold);box-shadow:0 10px 40px rgba(201,168,76,.14);transform:translateY(-3px)}
  .proj-img{width:100%;height:200px;background:linear-gradient(135deg,#2d1e06,#12100a);display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden;position:relative}
  .proj-img img{width:100%;height:100%;object-fit:cover}
  .proj-photo-count{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.65);color:var(--gold-light);font-size:11px;font-weight:600;padding:4px 11px;border-radius:25px;backdrop-filter:blur(6px)}
  .proj-body{padding:22px}
  .proj-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .sbadge{font-size:12px;padding:4px 12px;border-radius:25px;font-weight:600}
  .s-active{background:#d4edda;color:#155724}.s-done{background:#fff3cd;color:#856404}.s-soon{background:#d1ecf1;color:#0c5460}
  .s-open{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--deep)}
  .proj-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:8px}
  .proj-desc{color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:12px}
  .proj-cta{font-size:13px;color:var(--gold-dark);font-weight:600;padding-top:10px;border-top:1px solid var(--border)}

  .about-banner{background:linear-gradient(135deg,var(--deep),#231700);padding:80px 24px;text-align:center}
  .about-banner h2{font-family:var(--font-display);font-size:34px;color:var(--gold-light);margin-bottom:16px}
  .about-banner p{color:#c8b888;font-size:16px;max-width:580px;margin:0 auto;line-height:1.9}
  .trust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px;max-width:1000px;margin:50px auto;padding:0 24px}
  .trust-card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(180%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);border:1px solid var(--glass-border);border-radius:16px;padding:28px 24px;text-align:center;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease,background .3s ease;cursor:pointer;box-shadow:var(--glass-shadow),var(--glass-shadow-inner)}
  .trust-card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 30px rgba(201,168,76,.12)}
  .trust-icon{font-size:38px;margin-bottom:12px}
  .trust-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:7px}
  .trust-desc{color:var(--text-muted);font-size:13px;line-height:1.7}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--glass-bg-strong);backdrop-filter:blur(var(--glass-blur-strong)) saturate(180%);-webkit-backdrop-filter:blur(var(--glass-blur-strong)) saturate(180%);border-radius:20px;width:100%;max-width:960px;max-height:92vh;overflow-y:auto;padding:32px;border:1px solid var(--glass-border);animation:slideUp .3s ease;box-shadow:0 30px 90px rgba(0,0,0,.18),var(--glass-shadow-inner)}
  @keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);gap:16px}
  .modal-title-wrap{flex:1}
  .modal-title-cat{font-size:11px;color:var(--gold-dark);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
  .modal-title{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.3}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);flex-shrink:0;padding:0;line-height:1}
  .prod-detail{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
  .prod-main-img{width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#2d1e06,#12100a);display:flex;align-items:center;justify-content:center;font-size:60px}
  .prod-main-img img{width:100%;height:100%;object-fit:cover}
  .prod-thumbs{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
  .prod-thumb{width:64px;height:64px;border-radius:8px;border:2px solid var(--border);cursor:pointer;overflow:hidden;background:#2d1e06;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
  .prod-thumb.active{border-color:var(--gold)}
  .prod-thumb img{width:100%;height:100%;object-fit:cover}
  .prod-info h2{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:6px}
  .prod-price{font-size:28px;font-weight:700;color:var(--gold-dark);font-family:var(--font-display);margin:12px 0}
  .prod-desc{color:var(--text-muted);font-size:14px;line-height:1.85;margin-bottom:18px}
  .spec-box{background:white;border-radius:10px;padding:14px;margin-bottom:18px;border:1px solid var(--border)}
  .spec-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0e8d0;font-size:14px;gap:14px}
  .spec-row:last-child{border-bottom:none}
  .spec-k{color:var(--text-muted);font-weight:500;flex-shrink:0}.spec-v{font-weight:600;text-align:right}
  .detail-list{list-style:none;margin-bottom:18px}
  .detail-list li{font-size:13px;color:var(--text-muted);padding:5px 0;display:flex;gap:8px}
  .detail-list li::before{content:'✦';color:var(--gold);font-size:10px;flex-shrink:0;margin-top:3px}

  /* VARIANT GALLERY — masonry style, original aspect ratios, many at once */
  .variant-gallery{column-count:5;column-gap:10px}
  .variant-photo{break-inside:avoid;margin-bottom:10px;border-radius:10px;overflow:hidden;background:#2d1e06;cursor:zoom-in;transition:transform .2s}
  .variant-photo:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,.2)}
  .variant-photo img{width:100%;height:auto;display:block}
  @media(max-width:1100px){.variant-gallery{column-count:4}}
  @media(max-width:780px){.variant-gallery{column-count:3}}
  @media(max-width:520px){.variant-gallery{column-count:2}}

  /* LIGHTBOX */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:600;align-items:center;justify-content:center;padding:24px;animation:lbFade .25s ease}
  #lightbox.open{display:flex}
  @keyframes lbFade{from{opacity:0}to{opacity:1}}
  #lbImgWrap{max-width:95vw;max-height:90vh;display:flex;align-items:center;justify-content:center;cursor:default}
  #lbImg{max-width:95vw;max-height:90vh;width:auto;height:auto;object-fit:contain;border-radius:6px;box-shadow:0 12px 60px rgba(0,0,0,.5)}
  #lbClose{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s;z-index:2}
  #lbClose:hover{background:rgba(255,255,255,.2);transform:scale(1.05)}
  #lbPrev,#lbNext{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;width:50px;height:50px;border-radius:50%;font-size:32px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s;z-index:2;font-family:'Inter',sans-serif;padding:0}
  #lbPrev{left:18px}
  #lbNext{right:18px}
  #lbPrev:hover,#lbNext:hover{background:rgba(255,255,255,.22);transform:translateY(-50%) scale(1.05)}
  #lbCounter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:white;padding:6px 16px;border-radius:25px;font-size:13px;font-weight:500;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15)}
  @media(max-width:768px){
    #lbClose{top:12px;right:12px;width:38px;height:38px;font-size:18px}
    #lbPrev,#lbNext{width:42px;height:42px;font-size:26px}
    #lbPrev{left:8px}#lbNext{right:8px}
    #lbCounter{bottom:14px;font-size:12px;padding:5px 13px}
  }

  .cf-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .cf-btn{display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:50px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.2);color:white}
  .cf-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

  #toast{position:fixed;top:24px;right:24px;background:var(--deep);color:var(--gold-light);padding:13px 22px;border-radius:10px;font-size:14px;font-weight:500;border:1px solid rgba(201,168,76,.3);z-index:500;display:none;max-width:90vw;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slideInTR .3s ease}
  @keyframes slideInTR{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  .empty-state{text-align:center;padding:60px 24px;color:var(--text-muted);background:var(--surface);border:1px dashed var(--border);border-radius:14px}

  /* HAMBURGER */
  .menu-btn{display:none;background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold-light);width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:18px;align-items:center;justify-content:center}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(4px)}
  .mobile-overlay.open{display:block}

  /* TABLET */

    .nav-inner{padding:0 16px;height:60px}

    .content{padding:32px 16px}
    .sec-head{padding:50px 16px 36px}

    .hero-inner{order:2;padding:0 0 60px;text-align:center;max-width:100%}

    .hero-stats{margin:40px auto 0;max-width:100%}
    .hero-btns{justify-content:center}
    .hero-desc{margin:0 auto 30px}
    .scroll-cue{display:none}
    .about-banner{padding:50px 16px}
    .about-banner h2{font-size:26px}
    .trust-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:0 16px;margin:30px auto}

  /* MOBILE */
  @media(max-width:768px){
    body{font-size:14px}
    .topbar{font-size:11px;padding:6px 12px;letter-spacing:.5px}

    .nav-links a.active{border-left-color:var(--gold);background:rgba(201,168,76,.13)}

    .hero{grid-template-columns:1fr;padding:24px 18px 40px;min-height:auto;gap:0}

    .hero-title{font-size:32px !important;line-height:1.2 !important}
    .hero-sub{font-size:15px !important;margin-bottom:14px}
    .hero-desc{font-size:13.5px;margin-bottom:24px;line-height:1.7}
    .hero-desc br{display:none}
    .hero-btns{flex-direction:column;width:100%;gap:10px;justify-content:center}
    .hero-btns button{width:100%;padding:13px 22px;font-size:13px}

    .stat-num{font-size:22px}

    .sec-head{padding:36px 16px 28px}

    .gline{width:42px;margin:10px auto}

    .content{padding:28px 14px}

    /* Casing types: 2 columns on mobile (was 1) — much faster to scan
       through 8+ casing types without scrolling for ages. */

    .card-img{height:200px}
    .card-body{padding:14px 16px 8px}
    .card-title{font-size:15px}

    .ftype-name{font-size:14.5px;margin-bottom:5px;line-height:1.25}
    .ftype-desc{
      font-size:11.5px;line-height:1.5;margin-bottom:10px;
      -webkit-line-clamp:3;line-clamp:3;

    .ftype-cta{padding-top:10px;flex-wrap:wrap;gap:6px}
    .ftype-from{font-size:10px}

    .var-img{font-size:38px}
    .var-name{font-size:13px}
    .var-color-name{font-size:11px}
    .var-price{font-size:14px}
    .var-body{padding:11px 13px}

    .proj-img{height:170px;font-size:42px}
    .proj-body{padding:16px}
    .proj-title{font-size:15px}
    .proj-desc{font-size:13px}

    .cat-tabs{gap:6px;margin-bottom:20px}

    .crumb{font-size:13px;margin-bottom:18px}

    .about-banner{padding:50px 16px 40px}

    .trust-card{padding:22px 18px}

    @keyframes slideUpMobile{from{transform:translateY(100%)}to{transform:translateY(0)}}

  /* SMALL MOBILE */
  @media(max-width:380px){
    .var-grid{grid-template-columns:1fr}
    .hero-title{font-size:28px !important}
    .stat-num{font-size:20px}
    .hero-stats{gap:10px}
    .stat{min-width:60px}
  }

// Apply legacy migrations to a DB so older data shapes still work.
function applyDbMigrations(d){
  if(!d) return null;
  if(d.frameTypes && !d.casingTypes){d.casingTypes=d.frameTypes;delete d.frameTypes;}
  if(!d.casingTypes)d.casingTypes=[];
  if(!d.settings)d.settings=defaultSettings();
  if(!d.settings.customPages)d.settings.customPages=[];
  // Backfill layout + items on legacy custom pages
  d.settings.customPages.forEach(p => {
    if(!p.layout) p.layout = 'article';
    if(!Array.isArray(p.items)) p.items = [];
  });
  if(d.settings.hero && d.settings.hero.bgImage===undefined)d.settings.hero.bgImage='';
  if(d.settings.hero && d.settings.hero.phra3dGlb===undefined)d.settings.hero.phra3dGlb='';
  if(d.settings.hero && d.settings.hero.phra3dFront===undefined)d.settings.hero.phra3dFront='';
  if(d.settings.hero && d.settings.hero.phra3dBack===undefined)d.settings.hero.phra3dBack='';
  if(d.settings.hero && d.settings.hero.heroImage===undefined)d.settings.hero.heroImage='';
  const def=defaultSettings();
  if(!d.settings.payment)d.settings.payment=def.payment;
  if(!d.settings.featured)d.settings.featured=def.featured;
  if(!d.settings.reviews)d.settings.reviews=def.reviews;
  if(d.settings.reviews){
    if(d.settings.reviews.showOnHome===undefined)d.settings.reviews.showOnHome=true;
    if(d.settings.reviews.homeTitle===undefined)d.settings.reviews.homeTitle=def.reviews.homeTitle;
    if(d.settings.reviews.homeSub===undefined)d.settings.reviews.homeSub=def.reviews.homeSub;
    if(d.settings.reviews.homeCount===undefined)d.settings.reviews.homeCount=3;
    if(d.settings.reviews.homeMode===undefined)d.settings.reviews.homeMode='top';
  }
  if(d.settings.searchPlaceholder===undefined)d.settings.searchPlaceholder=def.searchPlaceholder;
  if(d.settings.contactPmText===undefined)d.settings.contactPmText=def.contactPmText;
  if(d.settings.displayFont===undefined)d.settings.displayFont=def.displayFont;
  // Auto-upgrade old emoji logo to the favicon image now that we have one.
  // Only does this once — if the user has set anything other than the legacy
  // default emoji, we respect their choice.
  if(d.settings.logoIcon === '📿') d.settings.logoIcon = def.logoIcon;
  if(!Array.isArray(d.settings.homeOrder)){
    d.settings.homeOrder = def.homeOrder.slice();
  } else {
    def.homeOrder.forEach(s => {
      if(!d.settings.homeOrder.some(x => x && x.id === s.id)){
        d.settings.homeOrder.push({...s});
      }
    });
    const knownIds = def.homeOrder.map(s => s.id);
    d.settings.homeOrder = d.settings.homeOrder.filter(x => x && knownIds.includes(x.id));
  }
  if(d.settings.contacts){d.settings.contacts.forEach(c=>{if(c.url===undefined)c.url='';});}
  if(d.settings.nav && Array.isArray(d.settings.nav)){
    if(!d.settings.nav.find(n=>n.id==='reviews')){
      const aboutIdx=d.settings.nav.findIndex(n=>n.id==='about');
      const insertAt=aboutIdx>=0?aboutIdx+1:d.settings.nav.length;
      d.settings.nav.splice(insertAt,0,{id:'reviews',label:'Reviews',visible:true,enabled:true,builtin:true});
    }
    if(!d.settings.nav.find(n=>n.id==='payment')){
      const revIdx=d.settings.nav.findIndex(n=>n.id==='reviews');
      const insertAt=revIdx>=0?revIdx+1:d.settings.nav.length;
      d.settings.nav.splice(insertAt,0,{id:'payment',label:'Payment',visible:true,enabled:true,builtin:true});
    }
  }
  ['amulets','accessories'].forEach(k=>{
    if(d[k])d[k].forEach(it=>{if(!it.status)it.status='available';if(it.hidePrice===undefined)it.hidePrice=false;if(!it.featured)it.featured=false;});
  });
  if(!d.reviews)d.reviews=[];
  if(!d.amulets)d.amulets=[];
  if(!d.accessories)d.accessories=[];
  if(!d.projects)d.projects=[];
  return rewriteImageUrls(d);
}

// ─── LEGACY URL REWRITER ────────────────────────────────────────────────
// Walks the DB and converts any old ImageKit URLs back to direct Firebase
// Storage URLs (pointing at the legacy US bucket). After the Asia-bucket
// migration finishes, every URL will be a *.firebasestorage.app one and
// this rewriter becomes a no-op.
function rewriteImageUrls(d){
  const rw = (window._rewriteLegacyImageUrl || ((u) => u));

  // Helper to rewrite an array of image URLs in place
  const arrRw = (arr) => Array.isArray(arr) ? arr.map(rw) : arr;

  // Settings — single-image fields and the nav/page image arrays
  if(d.settings){
    if(d.settings.hero){
      d.settings.hero.bgImage    = rw(d.settings.hero.bgImage);
      d.settings.hero.heroImage  = rw(d.settings.hero.heroImage);
      d.settings.hero.phra3dFront = rw(d.settings.hero.phra3dFront);
      d.settings.hero.phra3dBack  = rw(d.settings.hero.phra3dBack);
      // phra3dGlb is a .glb file, not an image — also CDN-eligible
      d.settings.hero.phra3dGlb   = rw(d.settings.hero.phra3dGlb);
    }
    if(d.settings.payment && d.settings.payment.qrImage){
      d.settings.payment.qrImage = rw(d.settings.payment.qrImage);
    }
    if(Array.isArray(d.settings.featured)){
      d.settings.featured.forEach(f => { if(f && f.img) f.img = rw(f.img); });
    }
  }

  // Item arrays — each has an imgs[] (and sometimes bannerImg)
  (d.amulets    || []).forEach(it => { it.imgs = arrRw(it.imgs); });
  (d.accessories|| []).forEach(it => { it.imgs = arrRw(it.imgs); });
  (d.projects   || []).forEach(it => { it.imgs = arrRw(it.imgs); });
  (d.reviews    || []).forEach(it => { it.imgs = arrRw(it.imgs); });

  // Casing types — banner image + nested variants
  (d.casingTypes || []).forEach(ty => {
    ty.bannerImg = rw(ty.bannerImg);
    (ty.variants || []).forEach(v => { v.imgs = arrRw(v.imgs); });
  });

  return d;
}

// Demo seed used when the Firestore doc doesn't exist yet (first run)
// or while data is still loading.
function seedDB(){
  return {
    settings:defaultSettings(),
    amulets:[],
    accessories:[],
    casingTypes:[],
    projects:[],
    reviews:[],
  };
}

function getDB(){
  // Read from Firebase in-memory cache. The cache is kept in sync with
  // Firestore via onSnapshot in firebase-shared.js — so this is always fresh.
  if(window.FB){
    const d = window.FB.getDB();
    if(d && Object.keys(d).length) return applyDbMigrations(d);
  }
  return seedDB();
}

// `lang` is a global property derived from <body class="th">.
// Code throughout the file uses `lang === 'th'` to localise dynamically
// generated HTML — declaring it as a getter on `window` means it stays
// up to date when the user toggles language without us having to push
// updates to every consumer.
Object.defineProperty(window, 'lang', {
  get(){ return document.body.classList.contains('th') ? 'th' : 'en'; },
  configurable: true,
});

function applySettings(){
  const db=getDB(); const s=db.settings;
  document.getElementById('pageTitle').textContent=s.pageTitle;
  document.getElementById('topbar').textContent=s.topbar;
  // logoIcon supports either emoji (📿) or a URL/path (/favicon/...) — auto-detect
  const logoEl = document.getElementById('logoIcon');
  const v = s.logoIcon || '';
  const looksLikeImage = /^(\/|https?:\/\/|\.\/|data:image\/)/i.test(v) || /\.(png|jpe?g|svg|webp|gif)(\?|$)/i.test(v);
  if(looksLikeImage){
    logoEl.classList.add('has-image');
    logoEl.innerHTML = `<img src="${v}" alt="logo">`;
  } else {
    logoEl.classList.remove('has-image');
    logoEl.textContent = v;
  }
  document.getElementById('logoText').textContent=s.logoText;
  document.getElementById('logoSub').textContent=s.logoSub;

  // DISPLAY FONT
  if(s.displayFont){
    document.documentElement.style.setProperty('--font-display', `"${s.displayFont}", serif`);
  }

  // HERO BG
  const bg=document.getElementById('heroBg');const ov=document.getElementById('heroBgOverlay');
  if(s.hero.bgImage){
    bg.style.backgroundImage=`url('${s.hero.bgImage}')`;
    bg.classList.add('show');
    ov.style.display='block';
  } else {
    bg.style.backgroundImage='';
    bg.classList.remove('show');
    ov.style.display='none';
  }

  // HERO VISUAL — four modes in priority order:
  //   1. heroImage (a still image)
  //   2. GLB 3D model
  //   3. Front + Back tablet images (3D)
  //   4. no visual — single-column hero
  window.PHRA_GLB        = s.hero.phra3dGlb || '';
  window.PHRA_FRONT_IMG  = s.hero.phra3dFront || '';
  window.PHRA_BACK_IMG   = s.hero.phra3dBack  || '';
  const heroImage = s.hero.heroImage || '';
  const hero3dBlock = document.querySelector('.hero-3d');
  const heroSection = document.querySelector('.hero');
  const has3D = !!(window.PHRA_GLB || (window.PHRA_FRONT_IMG && window.PHRA_BACK_IMG));
  const hasHeroVisual = !!(heroImage || has3D);
  if(hero3dBlock){
    // Clean previous content (image element or canvas leftover)
    const existingImg = hero3dBlock.querySelector('.hero-still-img');
    const canvas = document.getElementById('phra3d');
    if(heroImage){
      // Still image mode — hide canvas, show image
      if(canvas) canvas.style.display = 'none';
      if(existingImg){
        existingImg.src = heroImage;
      } else {
        const img = document.createElement('img');
        img.className = 'hero-still-img';
        // Hero is above-the-fold — load with highest priority, not lazy
        img.setAttribute('loading', 'eager');
        img.setAttribute('fetchpriority', 'high');
        img.setAttribute('decoding', 'async');
        img.src = heroImage;
        img.alt = '';
        hero3dBlock.appendChild(img);
      }
      hero3dBlock.style.display = '';
      hero3dBlock.classList.remove('has-3d'); // suppress 3D glow halo for still images
      if(heroSection){
        heroSection.classList.remove('no-3d');
        heroSection.classList.add('has-hero-image'); // suppress overlays
      }
    } else if(has3D){
      // 3D mode — remove still image if it was there, show canvas
      if(existingImg) existingImg.remove();
      if(canvas) canvas.style.display = '';
      hero3dBlock.style.display = '';
      hero3dBlock.classList.add('has-3d'); // enable 3D glow halo
      if(heroSection){
        heroSection.classList.remove('no-3d');
        heroSection.classList.remove('has-hero-image');
      }
      if(typeof window.initPhra3D === 'function'){
        window.initPhra3D();
      } else if(typeof window.refreshPhra3DTextures === 'function'){
        window.refreshPhra3DTextures();
      }
    } else {
      // No visual — hide the right column entirely
      if(existingImg) existingImg.remove();
      hero3dBlock.style.display = 'none';
      hero3dBlock.classList.remove('has-3d');
      if(heroSection){
        heroSection.classList.add('no-3d');
        heroSection.classList.remove('has-hero-image');
      }
    }
  }

  // NAV (built-in + custom pages)
  const visibleNav=(s.nav||[]).filter(n=>n.visible);
  document.getElementById('navLinks').innerHTML=visibleNav.map(n=>`<li><a id="nav-${n.id}" onclick="goPage('${n.id}')">${n.label}</a></li>`).join('');

  // CUSTOM PAGES — render their containers
  renderCustomPages();

  // HERO
  document.getElementById('heroEyebrow').textContent=s.hero.eyebrow;
  document.getElementById('heroTitle').innerHTML=s.hero.titleHighlight?`<span class="ying">${s.hero.titleHighlight}</span> ${s.hero.titleRest||''}`:(s.hero.titleRest||'');
  document.getElementById('heroSub').textContent=s.hero.sub;
  document.getElementById('heroDesc').innerHTML=s.hero.desc;
  document.getElementById('heroBtns').innerHTML=(s.hero.buttons||[]).map(b=>{
    const cls=b.style==='gold'?'btn-gold':'btn-ol';
    return `<button class="${cls}" onclick="goPage('${b.target}')">${b.label}</button>`;
  }).join('');
  document.getElementById('heroStats').innerHTML=(s.hero.stats||[]).map((st,i)=>{
    let val=st.value||'0';
    if(st.source==='amulets')val=db.amulets.length;
    else if(st.source==='accessories')val=db.accessories.length;
    else if(st.source==='projects')val=db.projects.length;
    return `<div class="stat"><div class="stat-num" id="stat-${i}">${val}</div><div class="stat-label">${st.label}</div></div>`;
  }).join('');

  document.getElementById('svcTitle').textContent=s.homeServices.title;
  document.getElementById('svcCards').innerHTML=(s.homeServices.cards||[]).map(c=>`
    <div class="trust-card" onclick="goPage('${c.target}')">
      <div class="trust-icon">${c.icon}</div>
      <div class="trust-title">${c.title}</div>
      <div class="trust-desc">${c.desc}</div>
    </div>`).join('');

  document.getElementById('amuletsTitle').textContent=s.sections.amulets.title;
  document.getElementById('amuletsDesc').textContent=s.sections.amulets.desc;
  document.getElementById('accTitle').textContent=s.sections.accessories.title;
  document.getElementById('accDesc').textContent=s.sections.accessories.desc;
  document.getElementById('casingTitle').textContent=s.sections.casing.title;
  document.getElementById('casingDesc').textContent=s.sections.casing.desc;
  document.getElementById('projTitle').textContent=s.sections.projects.title;
  document.getElementById('projDesc').textContent=s.sections.projects.desc;
  document.getElementById('aboutTitle').textContent=s.sections.about.title;
  document.getElementById('aboutDesc').textContent=s.sections.about.desc;

  document.getElementById('trustGrid').innerHTML=(s.trustCards||[]).map(t=>`
    <div class="trust-card">
      <div class="trust-icon">${t.icon}</div>
      <div class="trust-title">${t.title}</div>
      <div class="trust-desc">${t.desc}</div>
    </div>`).join('');

  document.getElementById('contactFloat').innerHTML=(s.contacts||[]).map(c=>`
    <button class="cf-btn" style="background:${c.color}" onclick="onContactClick(${JSON.stringify(c.url||'').replace(/"/g,'&quot;')},${JSON.stringify(c.message||'').replace(/"/g,'&quot;')})">${c.label}</button>
  `).join('');

  // ── FEATURED on home ──
  renderFeatured();
  // ── REVIEWS preview on home ──

  // ── Apply homepage section order ──
  applyHomeOrder(s);
  // ── REVIEWS page ──
  document.getElementById('revTitle').textContent=(s.reviews&&s.reviews.title)||'🙏 Reviews';
  document.getElementById('revSub').textContent=(s.reviews&&s.reviews.sub)||'';
  // ── PAYMENT page ──
  renderPayment();
  // ── SEARCH placeholders ──
  const sph=s.searchPlaceholder||'Search…';
  if(document.getElementById('aSearch'))document.getElementById('aSearch').placeholder=sph;
  if(document.getElementById('acSearch'))document.getElementById('acSearch').placeholder=sph;

  setTimeout(()=>{
    (s.hero.stats||[]).forEach((st,i)=>{
      let target=parseInt(st.value)||0;
      if(st.source==='amulets')target=db.amulets.length;
      else if(st.source==='accessories')target=db.accessories.length;
      else if(st.source==='projects')target=db.projects.length;
      else if(st.value && st.value.indexOf('%')>=0){document.getElementById('stat-'+i).textContent=st.value;return;}

function renderCustomPages(){
  const db=getDB();const cp=db.settings.customPages||[];
  const container=document.getElementById('customPages');
  container.innerHTML=cp.map(p=>{
    const layout = p.layout || 'article';
    const items  = p.items || [];
    let body;
    if(layout === 'article' || !items.length){
      // Article: single rich-text block
      body = `<div class="custom-page-content">
        ${p.content||'<p style="text-align:center;color:var(--text-muted);font-style:italic">No content yet. Edit this page in the admin to add content.</p>'}
      </div>`;
    } else if(layout === 'list'){
      // List: vertical rows of image + text
      body = `<div class="cp-list">${items.map(it => `
        <div class="cp-list-item" onclick="openCpItem('${p.id}','${it.id}')">
          ${it.img?`<div class="cp-list-img"><img loading="lazy" decoding="async" src="${it.img}" alt=""></div>`:''}
          <div class="cp-list-body">
            <h3 class="cp-list-title">${it.title || ''}</h3>
            ${it.subtitle?`<div class="cp-list-subtitle">${it.subtitle}</div>`:''}
            ${it.content?`<div class="cp-list-content">${truncateHtml(it.content, 180)}</div>`:''}
            ${it.content?`<div class="cp-list-more">Read more →</div>`:''}
          </div>
        </div>
      `).join('')}</div>`;
    } else {
      // Grid: cards in responsive grid
      body = `<div class="cp-grid">${items.map(it => `
        <div class="cp-card" onclick="openCpItem('${p.id}','${it.id}')">
          <div class="cp-card-img">${it.img?`<img loading="lazy" decoding="async" src="${it.img}" alt="">`:'📄'}</div>
          <div class="cp-card-body">
            <h3 class="cp-card-title">${it.title || ''}</h3>
            ${it.subtitle?`<div class="cp-card-subtitle">${it.subtitle}</div>`:''}
            <div class="cp-card-more">View details →</div>
          </div>
        </div>
      `).join('')}</div>`;
    }
    return `
    <div id="page-${p.id}" class="page">
      <div class="sec-head"><h2>${p.title||p.label}</h2><div class="gline"></div>${p.desc?`<p>${p.desc}</p>`:''}</div>
      <div class="content">${body}</div>
    </div>`;
  }).join('');
}

// Strip HTML tags then truncate — used for grid/list card previews
function truncateHtml(html, maxLen){
  const plain = String(html||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();
  if(plain.length <= maxLen) return plain;
  return plain.slice(0, maxLen) + '…';
}

// Open detail modal for a single custom-page item (used by grid/list cards)
function openCpItem(pageId, itemId){
  const db = getDB();
  const p = (db.settings.customPages||[]).find(x => x.id === pageId);
  if(!p) return;
  const it = (p.items||[]).find(x => String(x.id) === String(itemId));
  if(!it) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-head" style="padding-bottom:14px;margin-bottom:18px">
      <div class="modal-title-wrap">
        <div class="modal-title" style="font-size:24px">${it.title || ''}</div>
        ${it.subtitle?`<div style="font-size:14px;color:var(--text-muted);margin-top:4px">${it.subtitle}</div>`:''}
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${it.img?`<div style="text-align:center;margin-bottom:22px"><img src="${it.img}" alt="" style="max-width:100%;max-height:400px;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.15)"></div>`:''}
    <div class="custom-page-content" style="max-width:100%;background:transparent;border:none;box-shadow:none;padding:0;backdrop-filter:none;-webkit-backdrop-filter:none">${it.content || '<p style="color:var(--text-muted);font-style:italic">No content.</p>'}</div>
  `;
  document.getElementById('modal').classList.add('open');
}

function animN(id,target){const el=document.getElementById(id);if(!el)return;let c=0;const iv=setInterval(()=>{c=Math.min(c+1,target);el.textContent=c;if(c>=target)clearInterval(iv);},60);}

function goPage(name){
  const db=getDB();
  const navItem=(db.settings.nav||[]).find(n=>n.id===name);
  if(navItem && !navItem.enabled)return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const pg=document.getElementById('page-'+name);if(pg)pg.classList.add('active');
  const n=document.getElementById('nav-'+name);if(n)n.classList.add('active');
  window.scrollTo(0,0);
  // close mobile menu
  document.getElementById('navLinks').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('open');
  if(name==='amulets'){curAcat='all';renderA('all');}
  if(name==='accessories'){curAccat='all';renderAc('all');}
  if(name==='casing'){curCasingType=null;renderCasingTypes();}
  if(name==='projects')renderP();
  if(name==='reviews')renderReviews();
  if(name==='payment')renderPayment();
  if(name==='home')applySettings();
}

// ── CONTACT CLICK ── opens URL if set, otherwise shows toast
function onContactClick(url,msg){
  if(url && url.trim()){
    window.open(url,'_blank','noopener');
  } else if(msg){
    showToast(msg);
  }
}

// ── PRE-FILL contact message with item name/price ──
function buildContactMsg(item,type){
  const s=getDB().settings;
  const typeLabel=type==='amulets'?'amulet':(type==='accessories'?'accessory':'item');
  const price=item.hidePrice?(s.contactPmText||'PM for price'):('S$'+Number(item.price||0).toLocaleString());
  return `Hi! I'm interested in the ${typeLabel}: "${item.name}" (${price}). Could you share more details? 🙏`;
}
function openContactWithItem(type,id){
  const db=getDB();const item=(db[type]||[]).find(i=>i.id===id);if(!item)return;
  const msg=buildContactMsg(item,type);
  // build buttons grid if multiple contacts
  const contacts=db.settings.contacts||[];
  if(!contacts.length){showToast(msg);return;}
  // open first one with URL by appending text where supported
  const c=contacts.find(x=>x.url&&x.url.trim());
  if(c){
    let url=c.url;
    // wa.me supports ?text=, m.me does not, line https links don't, but we still encode
    if(/wa\.me/i.test(url)){
      url+= (url.indexOf('?')>=0?'&':'?')+'text='+encodeURIComponent(msg);
    } else if(/api\.whatsapp/i.test(url)){
      url+= (url.indexOf('?')>=0?'&':'?')+'text='+encodeURIComponent(msg);
    }
    // copy message to clipboard so user can paste in apps that don't support pre-fill
    try{navigator.clipboard&&navigator.clipboard.writeText(msg);}catch(e){}
    window.open(url,'_blank','noopener');
    showToast('📋 Message copied — paste it in chat');
  } else {
    showToast(msg);
  }
}

function shareItem(type,id){
  const db=getDB();const item=(db[type]||[]).find(i=>i.id===id);if(!item)return;

  }
}

// ── FEATURED ──
function applyHomeOrder(s){
  const container = document.getElementById('homeSections');
  if(!container) return;
  const order = (s && Array.isArray(s.homeOrder)) ? s.homeOrder : [];
  if(!order.length) return;

  // Re-append sections in the order specified. Sections marked disabled
  // get display:none. Sections not in the order list keep their original
  // place (defensive — shouldn't happen because migration enforces parity).
  order.forEach(entry => {
    if(!entry || !entry.id) return;
    const sec = container.querySelector('[data-home-section="' + entry.id + '"]');
    if(!sec) return;
    container.appendChild(sec);  // moves to end (reorders by call sequence)
    if(entry.enabled === false){
      sec.dataset.disabledByOrder = '1';
      sec.style.display = 'none';
    } else {
      delete sec.dataset.disabledByOrder;
      // Don't force display:'' here — let each section's own renderer decide
      // (e.g. reviews section hides itself if there are no reviews).
      // We only un-hide if it was hidden ONLY because of the order setting.
      if(sec.style.display === 'none'){
        // Trigger that section's renderer to decide visibility
        if(entry.id === 'reviews')       renderHomeReviews();
        else if(entry.id === 'featured') renderFeatured();
        else                              sec.style.display = '';
      }
    }
  });
}

function renderHomeReviews(){
  const db = getDB();
  const r  = db.reviews || [];
  const s  = db.settings.reviews || {};
  const sec = document.getElementById('homeReviewsSection');
  if(!sec) return;

  // If admin disabled this section in homeOrder, always hide
  if(sec.dataset.disabledByOrder === '1'){
    sec.style.display = 'none';
    return;
  }

  // Hide if disabled in admin, or no reviews exist
  if(s.showOnHome === false || s.enabled === false || !r.length){
    sec.style.display = 'none';
    return;
  }

  // Pick which reviews to show
  const count = Math.max(1, Math.min(6, s.homeCount || 3));
  const mode  = s.homeMode || 'top';
  let picks = r.slice();
  if(mode === 'top'){
    picks.sort((a,b) => (b.rating||5) - (a.rating||5));
  } else if(mode === 'latest'){
    picks.reverse();  // newest at the end of the array
  } else if(mode === 'random'){
    picks.sort(() => Math.random() - 0.5);
  }
  picks = picks.slice(0, count);

  sec.style.display = '';
  document.getElementById('homeRevTitle').textContent = s.homeTitle || s.title || 'What Our Customers Say';
  const subEl = document.getElementById('homeRevSub');
  if(subEl) subEl.textContent = s.homeSub || '';

  const grid = document.getElementById('homeRevGrid');
  grid.innerHTML = picks.map(rv => {
    // Optional rating — show stars only if rating > 0
    const rating = rv.rating || 0;
    const starsHtml = rating > 0
      ? `<div class="rev-stars">${'★'.repeat(rating)}${'☆'.repeat(5-rating)}</div>`
      : '';
    // Anonymous or display-name override
    const displayName = rv.anonymous
      ? (lang==='th' ? 'ลูกค้า' : 'Anonymous Customer')
      : (rv.displayName || rv.name || (lang==='th' ? 'ลูกค้า' : 'Customer'));
    const imgsHtml = (rv.imgs && rv.imgs.length)
      ? `<div class="rev-imgs">${rv.imgs.slice(0,3).map((img,i)=>`<img loading="lazy" decoding="async" src="${img}" onclick="openReviewLightbox(${rv.id},${i})">`).join('')}</div>`
      : '';
    const textHtml = rv.text ? `<p class="rev-text">${rv.text}</p>` : '';
    return `
      <div class="rev-card${rv.text ? '' : ' rev-card-imgonly'}">
        <div class="rev-quote">"</div>
        ${starsHtml}
        ${textHtml}
        ${imgsHtml}
        <div class="rev-foot">
          <div>
            <div class="rev-name">${displayName}</div>
            ${rv.location && !rv.anonymous?`<div class="rev-loc">📍 ${rv.location}</div>`:''}
          </div>
          ${rv.date?`<div class="rev-date">${rv.date}</div>`:''}
        </div>
      </div>`;
  }).join('');
}

function renderFeatured(){
  const db=getDB();const f=db.settings.featured||{};
  const sec=document.getElementById('featuredSection');
  if(!sec) return;
  // If admin disabled this section in homeOrder, always hide
  if(sec.dataset.disabledByOrder === '1'){
    sec.style.display='none';
    return;
  }
  // gather featured items from amulets+accessories: explicit ids OR items with featured:true
  let items=[];
  (db.amulets||[]).forEach(a=>{if(a.featured||(f.ids||[]).includes('a'+a.id))items.push({...a,_type:'amulets'});});
  (db.accessories||[]).forEach(a=>{if(a.featured||(f.ids||[]).includes('ac'+a.id))items.push({...a,_type:'accessories'});});
  if(!f.enabled||!items.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('featuredTitle').textContent=f.title||'✨ Featured Pieces';
  document.getElementById('featuredSub').textContent=f.sub||'';
  document.getElementById('featuredGrid').innerHTML=items.slice(0,8).map(a=>buildCard(a,a._type,db.settings)).join('');
}

// ── BUILD CARD (shared) ──
function buildCard(a,type,settings){
  const icon=type==='amulets'?'📿':'⛓️';
  const status=a.status||'available';
  const overlay=status==='sold'?`<div class="status-overlay sold"><span>SOLD</span></div>`:(status==='reserved'?`<div class="status-overlay reserved"><span>RESERVED</span></div>`:'');
  const pill=status==='sold'?`<div class="status-pill sold">SOLD</div>`:(status==='reserved'?`<div class="status-pill reserved">RESERVED</div>`:'');
  const priceHtml=a.hidePrice?`<div class="price-pm">${settings.contactPmText||'PM for price'}</div>`:`<div class="card-price">S$${Number(a.price||0).toLocaleString()}</div>`;
  const tag=type==='amulets'?(a.temple||a.cat):a.cat;
  return `
    <div class="card" onclick="openProd('${type}',${a.id})">
      <div class="card-img">
        ${a.imgs&&a.imgs[0]?`<img loading="lazy" decoding="async" src="${a.imgs[0]}">`:`<div class="card-ph"><span style="font-size:44px">${icon}</span><span>No image</span></div>`}
        ${a.badge?`<div class="cbadge cbadge-gold">${a.badge}</div>`:''}
        ${pill}
        ${overlay}
      </div>
      <div class="card-body">
        <div class="card-cat">${a.cat||''}</div>
        <div class="card-title">${a.name}</div>
        <div class="card-desc">${(a.desc||'').slice(0,70)}${a.desc&&a.desc.length>70?'...':''}</div>
        ${priceHtml}
      </div>
      <div class="card-foot">
        <span class="tag">${tag||a.cat||''}</span>
        <button class="btn-sm" onclick="event.stopPropagation();openProd('${type}',${a.id})">Details</button>
      </div>
    </div>`;
}

let _aQuery='';
function searchA(){
  const v=document.getElementById('aSearch').value;
  _aQuery=v.toLowerCase().trim();
  document.getElementById('aSearchClear').classList.toggle('show',!!_aQuery);
  renderA(curAcat);
}
function clearSearchA(){document.getElementById('aSearch').value='';_aQuery='';document.getElementById('aSearchClear').classList.remove('show');renderA(curAcat);}
function applySort(list,sortKey){
  const arr=[...list];
  switch(sortKey){
    case 'price-asc':return arr.sort((a,b)=>(a.hidePrice?Infinity:Number(a.price||0))-(b.hidePrice?Infinity:Number(b.price||0)));
    case 'price-desc':return arr.sort((a,b)=>(b.hidePrice?-1:Number(b.price||0))-(a.hidePrice?-1:Number(a.price||0)));
    case 'name':return arr.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    case 'year-desc':return arr.sort((a,b)=>(parseInt(b.year)||0)-(parseInt(a.year)||0));
    case 'year-asc':return arr.sort((a,b)=>(parseInt(a.year)||0)-(parseInt(b.year)||0));
    default:
      // available first, sold last
      return arr.sort((a,b)=>{const sa=a.status==='sold'?2:(a.status==='reserved'?1:0);const sb=b.status==='sold'?2:(b.status==='reserved'?1:0);return sa-sb;});
  }
}
function matchSearch(item,q){
  if(!q)return true;
  const hay=[item.name,item.cat,item.temple,item.year,item.desc,item.badge].filter(Boolean).join(' ').toLowerCase();
  return hay.indexOf(q)>=0;
}
function renderA(cat){
  const db=getDB();const settings=db.settings;
  const cats=[...new Set(db.amulets.map(a=>a.cat).filter(Boolean))];
  buildTabs('aTabs',cats,cat,'filterA');
  let list=cat==='all'?db.amulets:db.amulets.filter(a=>a.cat===cat);
  list=list.filter(a=>matchSearch(a,_aQuery));
  const sort=document.getElementById('aSort')?document.getElementById('aSort').value:'default';
  list=applySort(list,sort);
  const cnt=document.getElementById('aCount');
  if(cnt)cnt.textContent=list.length?`Showing ${list.length} ${list.length===1?'piece':'pieces'}${_aQuery?' for "'+_aQuery+'"':''}`:'';
  document.getElementById('aGrid').innerHTML=list.length?list.map(a=>buildCard(a,'amulets',settings)).join(''):`<div class="empty-state" style="grid-column:1/-1">${_aQuery?'No items match "'+_aQuery+'".':'No items in this category.'}</div>`;
}
function filterA(cat,el){document.querySelectorAll('#aTabs .cat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');curAcat=cat;renderA(cat);}

function renderCasingTypes(){
  const db=getDB();
  document.getElementById('casingTypes').style.display='block';
  document.getElementById('casingVariants').style.display='none';
  const types=db.casingTypes||[];
  const grid=document.getElementById('cTypeGrid');
  if(!types.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">No casing types available yet.</div>`;return;}
  // Direct Firebase Storage URLs — no proxy/resize, just pass through.
  // Upload-time optimisation in firebase-shared.js already caps images at
  // 1920px and re-encodes to WebP q85, so they're already CDN-friendly.
  const bannerify = (url) => url;
  grid.innerHTML=types.map(ty=>{
    const count=(ty.variants||[]).length;
    return `
    <div class="ftype-card" onclick="openCasingType(${ty.id})">
      <div class="ftype-banner">
        ${ty.bannerImg?`<img loading="lazy" decoding="async" src="${bannerify(ty.bannerImg)}">`:`<span class="ftype-icon-bg">🪬</span>`}
        <div class="ftype-count">${count} ${count===1?'style':'styles'}</div>
      </div>
      <div class="ftype-body">
        <div class="ftype-name">${ty.name}</div>
        <div class="ftype-desc">${ty.desc || ''}</div>
        <div class="ftype-cta">
          ${ty.priceRange?`<div class="ftype-from">Price<br><strong>S$${ty.priceRange}</strong></div>`:(ty.price?`<div class="ftype-from">Price<br><strong>S$${Number(ty.price).toLocaleString()}</strong></div>`:'<div></div>')}
          <div class="ftype-arrow">View Styles →</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCasingType(typeId){curCasingType=typeId;renderVariants(typeId);window.scrollTo({top:0,behavior:'smooth'});}

function renderVariants(typeId){
  const db=getDB();
  const ty=(db.casingTypes||[]).find(x=>x.id===typeId);
  if(!ty){curCasingType=null;renderCasingTypes();return;}
  document.getElementById('casingTypes').style.display='none';
  document.getElementById('casingVariants').style.display='block';
  document.getElementById('vCrumb').innerHTML=`
    <a onclick="curCasingType=null;renderCasingTypes()">All Casing Types</a>
    <span class="crumb-sep">▸</span>
    <span class="crumb-cur">${ty.name}</span>`;
  document.getElementById('vTitle').textContent=ty.name;
  document.getElementById('vDesc').innerHTML = ty.desc || '';
  // Price badge — small chip next to the title (e.g. "Waterproof Casing  S$15-25")
  const sideEl = document.getElementById('vSide');
  if(ty.priceRange){
    sideEl.innerHTML = `<span class="cd-price-chip-label">${lang==='th'?'ราคา':'Price'}</span> <span class="cd-price-chip-value">S$${ty.priceRange}</span>`;
    sideEl.style.display = '';
  } else if(ty.price){
    sideEl.innerHTML = `<span class="cd-price-chip-label">${lang==='th'?'ราคาเริ่มต้น':'From'}</span> <span class="cd-price-chip-value">S$${Number(ty.price).toLocaleString()}</span>`;
    sideEl.style.display = '';
  } else {
    sideEl.style.display = 'none';
  }
  const vars=ty.variants||[];
  const grid=document.getElementById('vGrid');
  if(!vars.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">No styles in this type yet.</div>`;return;}
  // Direct URLs — see note in renderCasingTypes about why no resize.
  const thumbify = (url) => url;
  grid.innerHTML=vars.map(v=>`
    <div class="var-card" onclick="openVariant(${ty.id},${v.id})">
      <div class="var-img">
        ${v.imgs&&v.imgs[0]?`<img loading="lazy" decoding="async" src="${thumbify(v.imgs[0])}">`:'🪬'}
        ${v.price?`<div class="var-price-badge">S$${Number(v.price).toLocaleString()}</div>`:''}
        ${v.imgs&&v.imgs.length>1?`<div class="var-img-count">📷 ${v.imgs.length}</div>`:''}
      </div>

let _lbIndex = 0;
function openLightbox(idx){

  showLightboxImage();
  lb.classList.add('open');
  document.addEventListener('keydown', _lbKeyHandler);

function showLightboxImage(){
  const imgs = window._lbImages || [];
  if(!imgs.length) return;
  // Direct Firebase Storage URL — already optimised at upload time.
  const url = imgs[_lbIndex];
  document.getElementById('lbImg').src = url;
  document.getElementById('lbCounter').textContent = (_lbIndex+1) + ' / ' + imgs.length;
  // hide arrows if only 1 image
  const single = imgs.length <= 1;

  document.getElementById('lbNext').style.display = single ? 'none' : 'flex';
}
function lbNext(e){
  if(e) e.stopPropagation();
  const imgs = window._lbImages || [];
  _lbIndex = (_lbIndex + 1) % imgs.length;
  showLightboxImage();
}
function lbPrev(e){
  if(e) e.stopPropagation();
  const imgs = window._lbImages || [];
  _lbIndex = (_lbIndex - 1 + imgs.length) % imgs.length;
  showLightboxImage();
}
function closeLightbox(e){
  if(e && e.target.id !== 'lightbox' && e.target.id !== 'lbClose' && e.target.id !== 'lbImgWrap') return;
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', _lbKeyHandler);
}
function _lbKeyHandler(e){
  if(e.key === 'Escape') closeLightbox({target:{id:'lightbox'}});
  else if(e.key === 'ArrowRight') lbNext();
  else if(e.key === 'ArrowLeft') lbPrev();
}

// ─── IMAGE LOADING — IntersectionObserver-based ────────────────────────────
// Native loading="lazy" only kicks in when the image is very close to the
// viewport (usually ~100px). For a richer experience we use our own
// observer with a 250px rootMargin — images start downloading earlier, so
// by the time the user scrolls there they're already visible.
//
// Workflow per image:
//   1. On insertion: tag .is-loading (shimmer placeholder shows immediately)
//   2. Move actual `src` into `data-src`, leave src empty until observer fires
//   3. When 250px from viewport: set src, then listen for load event
//   4. On load: swap classes to .is-loaded (fade in)
//
// We don't strip `loading="lazy"` — it acts as a fallback if our JS is
// disabled or fails to run.
const _imgObserver = ('IntersectionObserver' in window)
  ? new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if(!entry.isIntersecting) return;
        const img = entry.target;
        const realSrc = img.dataset.src;
        if(realSrc){
          img.src = realSrc;
          img.removeAttribute('data-src');
        }
        obs.unobserve(img);
      });
    }, { rootMargin: '250px 0px', threshold: 0.01 })
  : null;

// ─── IMAGEKIT AUTO-RESIZE ──────────────────────────────────────────────────
// Inserts transformation params (resize, format, quality) into ImageKit URLs
// based on the image's actual display size. A 240×240 card no longer
// downloads a 1920×1920 source — it asks ImageKit to resize on the edge
// before sending bytes over the wire. Typical reduction: 90%+.
//
// We use devicePixelRatio so retina screens get 2x assets (still small).
// ─── IMAGE WATCH ────────────────────────────────────────────────
// Previously we had an applyImageKitResize() here that injected /tr:.../
// transformations into ImageKit URLs to fetch device-appropriate sizes.
// After migrating to a Singapore-region Firebase Storage bucket (no CDN
// proxy), images now come directly from Cloud Storage at their original
// (already optimised) dimensions. Upload-time optimisation in
// firebase-shared.js caps every image at 1920px wide and re-encodes to
// WebP at quality 85, so we no longer need on-the-fly resizing.

function watchImage(img){
  if(!img || img.dataset._watched) return;
  img.dataset._watched = '1';

  // Direct Firebase Storage URLs are already optimised at upload time
  // (capped 1920px, WebP q85). No on-the-fly resize needed.

  // Eager (above-the-fold) images: keep native loading, just listen for load
  if(img.getAttribute('loading') !== 'lazy'){
    if(img.complete && img.naturalWidth > 0){
      img.classList.add('is-loaded');
    } else {
      img.classList.add('is-loading');
      img.addEventListener('load', () => {
        img.classList.remove('is-loading');
        img.classList.add('is-loaded');
      }, {once:true});
      img.addEventListener('error', () => {
        img.classList.remove('is-loading');
      }, {once:true});
    }
    return;
  }

  // Lazy images: defer the network request until observer fires
  img.classList.add('is-loading');
  img.addEventListener('load', () => {
    if(img.naturalWidth > 0){
      img.classList.remove('is-loading');
      img.classList.add('is-loaded');
    }
  });
  img.addEventListener('error', () => {
    img.classList.remove('is-loading');
  });
  if(_imgObserver && img.src){
    // Move src → data-src so the network request waits for the observer
    const realSrc = img.src;
    img.removeAttribute('src');
    img.dataset.src = realSrc;
    _imgObserver.observe(img);
  } else if(img.complete && img.naturalWidth > 0){
    img.classList.remove('is-loading');
    img.classList.add('is-loaded');
  }
}

// Process images added dynamically by render functions (applySettings etc).
new MutationObserver(muts => {

// Wait for Firebase to load + initial data, then re-render the page.
async function bootIndex(){
  let tries = 0;
  while(!window.FB && tries < 100){ await new Promise(r => setTimeout(r, 50)); tries++; }
  if(!window.FB){
    // Even if Firebase failed to load, drop the splash so the page is usable
    document.documentElement.classList.add('fb-ready');
    setTimeout(() => {
      const s = document.getElementById('fbSplash');
      if(s) s.remove();
    }, 400);
    return;
  }
  // Wait for first DB load from Firestore
  await window.FB.ready();
  applySettings();
  // Now reveal the page — adds fb-ready class which fades out the splash
  // and shows any elements that were hidden to avoid the FOUC flash.
  document.documentElement.classList.add('fb-ready');
  setTimeout(() => {
    const s = document.getElementById('fbSplash');
    if(s) s.remove();
  }, 400);
  // Subscribe to live updates — if admin changes something, the visible
  // site updates without a refresh.
  window.FB.onDBChange(() => {
    try { applySettings(); } catch(e){ console.error(e); }
  });
}

// Register service worker (inline blob) for offline shell + install eligibility
(function setupSW(){
  if(!('serviceWorker' in navigator))return;
  // Service workers cannot run on file:// — skip to avoid security errors
  if(location.protocol === 'file:') return;
  const swCode=`
    const CACHE='yyy-v1';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(
        caches.open(CACHE).then(cache=>
          cache.match(e.request).then(hit=>{
            const fetchPromise=fetch(e.request).then(resp=>{
              if(resp&&resp.status===200&&resp.type==='basic')cache.put(e.request,resp.clone());
              return resp;
            }).catch(()=>hit);
            return hit||fetchPromise;
          })
        )
      );
    });
  `;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){}
})();
